[phases.setup]
nixPkgs = ["nodejs_20", "python3"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = [
  "npm run build:all",
  "mkdir -p build/verixia-embed",
  "cp build/embed/verixia-swap.js build/verixia-embed/swap.js",
  "echo '=== VERIXIA EMBED BUILT ===' && ls -lh build/verixia-embed/ && echo 'URL: https://swap.verixiaapps.com/verixia-embed/swap.js'"
]

[variables]
NODE_OPTIONS = "--max-old-space-size=4096"
GENERATE_SOURCEMAP = "false"
CI = "false"
NODE_ENV = "production"

[start]
cmd = "node server.js"
