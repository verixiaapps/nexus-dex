<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#03060f" />
    <meta name="description" content="Nexus DEX - Swap any token across any chain. Bitcoin, Solana, Ethereum and more. Non-custodial, no KYC." />
    <title>Nexus DEX | Multi-Chain Token Swap</title>

    <!-- PWA / iOS standalone mode.
         When a user "Add to Home Screen" from Safari, these tags make the app
         launch chromeless (no URL bar, no Safari tab strip) and treat it as a
         standalone home-screen app. Harmless in normal browsers. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nexus" />
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- App icons. You need to add these files to /public/ —
         see the note below for sizes. Until then the install prompt will
         still work, it just won't have a custom icon. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #03060f; color: #cdd6f4; font-family: 'Syne', sans-serif; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: #03060f; }
      ::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 2px; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .fade-up { animation: fadeUp 0.35s ease forwards; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Nexus DEX.</noscript>
    <div id="root"></div>
  </body>
</html>
