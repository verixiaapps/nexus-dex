<script>
function __flipsyAdmin() {
  "use strict";
  var web3 = window.solanaWeb3;
  var Connection = web3.Connection;
  var PublicKey = web3.PublicKey;
  var VersionedTransaction = web3.VersionedTransaction;
  var TransactionMessage = web3.TransactionMessage;
  var SystemProgram = web3.SystemProgram;
  var TransactionInstruction = web3.TransactionInstruction;
  var SYSVAR_RENT_PUBKEY = web3.SYSVAR_RENT_PUBKEY;

  var CFG = window.__FLIPSY_ADMIN_CONFIG__;
  var PROGRAM_ID = new PublicKey(CFG.programId);
  var OWNER_WALLET = CFG.ownerWallet;
  var connection = new Connection(CFG.rpc, 'confirmed');
  var LAMPORTS_PER_SOL = 1e9;

  // ============================================================
  // STATE
  // ============================================================
  var S = {
    publicKey: null,
    walletName: null,
    provider: null,
    solPrice: 0,
    config: null,
    loading: true,
    flash: null,
  };

  // ============================================================
  // HELPERS
  // ============================================================
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function shortAddr(s) { return s.slice(0,4) + '\u2026' + s.slice(-4); }
  function bytesToB64(u8) { var s=''; for(var i=0;i<u8.length;i++) s+=String.fromCharCode(u8[i]); return btoa(s); }
  function fmtSecondsHuman(s) {
    if (s < 60) return s + 's';
    if (s < 3600) return Math.round(s / 60) + 'm';
    if (s < 86400) return (s / 3600).toFixed(1) + 'h';
    return (s / 86400).toFixed(1) + 'd';
  }

  // Tiny u64 little-endian encoder/decoder
  function u64ToBytes(n) {
    var v = BigInt(n);
    var b = new Uint8Array(8);
    for (var i = 0; i < 8; i++) { b[i] = Number(v & 0xffn); v >>= 8n; }
    return b;
  }
  function i64ToBytes(n) {
    // Treat negatives via two's complement; admin only sends non-negative durations anyway.
    var v = BigInt(n);
    if (v < 0n) v = (1n << 64n) + v;
    return u64ToBytes(v.toString());
  }
  function bytesToU64(buf, off) {
    var v = 0n;
    for (var i = 7; i >= 0; i--) v = (v << 8n) | BigInt(buf[off + i]);
    return Number(v);
  }
  function bytesToI64(buf, off) {
    var v = 0n;
    for (var i = 7; i >= 0; i--) v = (v << 8n) | BigInt(buf[off + i]);
    if (v >= (1n << 63n)) v -= (1n << 64n);
    return Number(v);
  }

  // Anchor sighash = first 8 bytes of sha256("global:<method>")
  // Computed offline and hardcoded so we don't need a sha256 lib in browser.
  // method => 8-byte hex
  var DISCRIMINATORS = {
    set_authority:       'a78fcb7c00310bdc',
    set_cranker:         '8b3a3eaa0f1d8a85',
    set_bet_limits:      'ce5fd25c5b9d9d2e',
    set_program_params:  '6b3eedb6b7e36b06',
    set_paused:          '5c1c1657d6c8f8c4',
    force_refund:        '6a76d8c0c5d8ef00',
    sweep_unclaimed:     '5a64dee497cdd07b',
    super_sweep:         '2640ec71b3df5fa5',
  };

  // ============================================================
  // FIX — recompute discriminators in browser using SubtleCrypto.
  // Hardcoded ones above are placeholders; on init we replace them
  // with the real sha256 hash, since Anchor wants exact bytes.
  // ============================================================
  async function computeDiscriminators() {
    var methods = ['set_authority','set_cranker','set_bet_limits','set_program_params','set_paused','force_refund','sweep_unclaimed','super_sweep'];
    for (var i = 0; i < methods.length; i++) {
      var m = methods[i];
      var data = new TextEncoder().encode('global:' + m);
      var hash = await crypto.subtle.digest('SHA-256', data);
      var bytes = new Uint8Array(hash).slice(0, 8);
      var hex = '';
      for (var j = 0; j < 8; j++) hex += bytes[j].toString(16).padStart(2, '0');
      DISCRIMINATORS[m] = hex;
    }
  }

  function hexToBytes(hex) {
    var out = new Uint8Array(hex.length / 2);
    for (var i = 0; i < out.length; i++) out[i] = parseInt(hex.substr(i*2, 2), 16);
    return out;
  }

  function buildIxData(method, argBytes) {
    var disc = hexToBytes(DISCRIMINATORS[method]);
    var total = new Uint8Array(8 + (argBytes ? argBytes.length : 0));
    total.set(disc, 0);
    if (argBytes) total.set(argBytes, 8);
    return total;
  }

  function concatBytes(arrays) {
    var len = 0;
    for (var i = 0; i < arrays.length; i++) len += arrays[i].length;
    var out = new Uint8Array(len);
    var off = 0;
    for (var j = 0; j < arrays.length; j++) { out.set(arrays[j], off); off += arrays[j].length; }
    return out;
  }

  // ============================================================
  // PDAs
  // ============================================================
  function findConfigPda() {
    return PublicKey.findProgramAddressSync([new TextEncoder().encode('config')], PROGRAM_ID)[0];
  }
  function findRoundPda(epoch) {
    return PublicKey.findProgramAddressSync([new TextEncoder().encode('round'), u64ToBytes(epoch)], PROGRAM_ID)[0];
  }
  function findVaultPda(epoch) {
    return PublicKey.findProgramAddressSync([new TextEncoder().encode('vault'), u64ToBytes(epoch)], PROGRAM_ID)[0];
  }

  // ============================================================
  // CONFIG ACCOUNT DECODE (matches lib.rs Config struct layout)
  // Layout: 8 byte discriminator
  //   + authority: 32
  //   + cranker:   32
  //   + current_epoch:        u64 (8)
  //   + paused:               bool (1)
  //   + min_bet:              u64 (8)
  //   + max_bet:              u64 (8)
  //   + fee_bps:              u64 (8)
  //   + betting_duration:     i64 (8)
  //   + gap_duration:         i64 (8)
  //   + max_future_rounds:    u64 (8)
  //   + claim_forfeit_delay:  i64 (8)
  //   + force_refund_delay:   i64 (8)
  //   + bump:                 u8 (1)
  // ============================================================
  function decodeConfig(buf) {
    var u8 = new Uint8Array(buf);
    var off = 8;
    var authority = new PublicKey(u8.slice(off, off + 32)); off += 32;
    var cranker   = new PublicKey(u8.slice(off, off + 32)); off += 32;
    var currentEpoch = bytesToU64(u8, off); off += 8;
    var paused = u8[off] === 1; off += 1;
    var minBet = bytesToU64(u8, off); off += 8;
    var maxBet = bytesToU64(u8, off); off += 8;
    var feeBps = bytesToU64(u8, off); off += 8;
    var bettingDuration   = bytesToI64(u8, off); off += 8;
    var gapDuration       = bytesToI64(u8, off); off += 8;
    var maxFutureRounds   = bytesToU64(u8, off); off += 8;
    var claimForfeitDelay = bytesToI64(u8, off); off += 8;
    var forceRefundDelay  = bytesToI64(u8, off); off += 8;
    return { authority: authority.toBase58(), cranker: cranker.toBase58(), currentEpoch: currentEpoch, paused: paused, minBet: minBet, maxBet: maxBet, feeBps: feeBps, bettingDuration: bettingDuration, gapDuration: gapDuration, maxFutureRounds: maxFutureRounds, claimForfeitDelay: claimForfeitDelay, forceRefundDelay: forceRefundDelay };
  }

  async function loadConfig() {
    try {
      var pda = findConfigPda();
      var info = await connection.getAccountInfo(pda, 'confirmed');
      if (!info) { S.config = null; S.loading = false; render(); return; }
      S.config = decodeConfig(info.data);
      S.loading = false;
      render();
    } catch (e) {
      console.error('[admin] load config failed', e);
      S.config = null;
      S.loading = false;
      render();
    }
  }

  // ============================================================
  // PRICE POLLER
  // ============================================================
  async function pollPrice() {
    try {
      var r = await fetch(CFG.priceUrl);
      var j = await r.json();
      var p = parseFloat(j && j.data && j.data.amount);
      if (Number.isFinite(p) && p > 0) { S.solPrice = p; render(); }
    } catch (e) {}
  }

  // ============================================================
  // INSTRUCTION BUILDERS
  // Account orders must match lib.rs #[derive(Accounts)] structs exactly.
  // ============================================================
  function ixSetPaused(paused) {
    var args = new Uint8Array(1);
    args[0] = paused ? 1 : 0;
    return new TransactionInstruction({
      programId: PROGRAM_ID,
      keys: [
        { pubkey: findConfigPda(), isSigner: false, isWritable: true },
        { pubkey: S.publicKey,     isSigner: true,  isWritable: false },
      ],
      data: buildIxData('set_paused', args),
    });
  }
  function ixSetBetLimits(minBet, maxBet) {
    var args = concatBytes([u64ToBytes(minBet), u64ToBytes(maxBet)]);
    return new TransactionInstruction({
      programId: PROGRAM_ID,
      keys: [
        { pubkey: findConfigPda(), isSigner: false, isWritable: true },
        { pubkey: S.publicKey,     isSigner: true,  isWritable: false },
      ],
      data: buildIxData('set_bet_limits', args),
    });
  }
  function ixSetProgramParams(feeBps, bettingDuration, gapDuration, maxFutureRounds, claimForfeitDelay, forceRefundDelay) {
    var args = concatBytes([
      u64ToBytes(feeBps),
      i64ToBytes(bettingDuration),
      i64ToBytes(gapDuration),
      u64ToBytes(maxFutureRounds),
      i64ToBytes(claimForfeitDelay),
      i64ToBytes(forceRefundDelay),
    ]);
    return new TransactionInstruction({
      programId: PROGRAM_ID,
      keys: [
        { pubkey: findConfigPda(), isSigner: false, isWritable: true },
        { pubkey: S.publicKey,     isSigner: true,  isWritable: false },
      ],
      data: buildIxData('set_program_params', args),
    });
  }
  function ixSetCranker(newCranker) {
    var args = newCranker.toBuffer();
    return new TransactionInstruction({
      programId: PROGRAM_ID,
      keys: [
        { pubkey: findConfigPda(), isSigner: false, isWritable: true },
        { pubkey: S.publicKey,     isSigner: true,  isWritable: false },
      ],
      data: buildIxData('set_cranker', args),
    });
  }
  function ixSetAuthority(newAuth) {
    var args = newAuth.toBuffer();
    return new TransactionInstruction({
      programId: PROGRAM_ID,
      keys: [
        { pubkey: findConfigPda(), isSigner: false, isWritable: true },
        { pubkey: S.publicKey,     isSigner: true,  isWritable: false },
      ],
      data: buildIxData('set_authority', args),
    });
  }
  function ixForceRefund(epoch) {
    return new TransactionInstruction({
      programId: PROGRAM_ID,
      keys: [
        { pubkey: findConfigPda(),    isSigner: false, isWritable: false },
        { pubkey: findRoundPda(epoch),isSigner: false, isWritable: true  },
        { pubkey: S.publicKey,        isSigner: true,  isWritable: false },
      ],
      data: buildIxData('force_refund', null),
    });
  }
  function ixSweepUnclaimed(epoch) {
    return new TransactionInstruction({
      programId: PROGRAM_ID,
      keys: [
        { pubkey: findConfigPda(),     isSigner: false, isWritable: false },
        { pubkey: findRoundPda(epoch), isSigner: false, isWritable: true  },
        { pubkey: findVaultPda(epoch), isSigner: false, isWritable: true  },
        { pubkey: S.publicKey,         isSigner: false, isWritable: true  }, // authority recipient
        { pubkey: S.publicKey,         isSigner: true,  isWritable: false }, // signer
      ],
      data: buildIxData('sweep_unclaimed', null),
    });
  }
  function ixSuperSweep(epoch) {
    return new TransactionInstruction({
      programId: PROGRAM_ID,
      keys: [
        { pubkey: findConfigPda(),     isSigner: false, isWritable: false },
        { pubkey: findRoundPda(epoch), isSigner: false, isWritable: true  },
        { pubkey: findVaultPda(epoch), isSigner: false, isWritable: true  },
        { pubkey: S.publicKey,         isSigner: false, isWritable: true  },
        { pubkey: S.publicKey,         isSigner: true,  isWritable: false },
      ],
      data: buildIxData('super_sweep', null),
    });
  }

  // ============================================================
  // TX HELPER — sign and send via VerixiaWallet provider
  // ============================================================
  async function sendIx(label, ix) {
    if (!S.publicKey || !S.provider) { setFlash('error', 'Wallet not connected'); return; }
    setFlash('info', label + '…');
    try {
      var latest = await connection.getLatestBlockhash('confirmed');
      var msg = new TransactionMessage({
        payerKey: S.publicKey,
        recentBlockhash: latest.blockhash,
        instructions: [ix],
      }).compileToV0Message();
      var tx = new VersionedTransaction(msg);

      var sig;
      if (S.provider._supportsSignAndSend && !S.provider._supportsSignTx) {
        sig = await S.provider.signAndSendTransaction(tx);
      } else {
        var signed = await S.provider.signTransaction(tx);
        sig = await connection.sendRawTransaction(signed.serialize(), { skipPreflight: false, maxRetries: 3 });
      }
      // Wait briefly for confirmation
      try {
        await Promise.race([
          connection.confirmTransaction({ signature: sig, blockhash: latest.blockhash, lastValidBlockHeight: latest.lastValidBlockHeight }, 'confirmed'),
          new Promise(function(_, rej) { setTimeout(function() { rej(new Error('confirm-timeout')); }, 30000); }),
        ]);
      } catch (e) {}
      setFlash('success', label + ' ✓  ' + sig.slice(0,8) + '…');
      setTimeout(loadConfig, 1500);
    } catch (e) {
      console.error('[admin]', label, e);
      var msg2 = (e && e.error && e.error.errorMessage) || (e && e.message) || 'Failed';
      setFlash('error', label + ': ' + msg2);
    }
  }

  // Provider wrapper matching the swap page pattern
  function wrapProvider(raw, pubkey) {
    if (!raw) return null;
    var hasSignTx = typeof raw.signTransaction === 'function';
    var hasSignAndSend = typeof raw.signAndSendTransaction === 'function';

    function b64ToBytes(b64) { return Uint8Array.from(atob(b64), function(c) { return c.charCodeAt(0); }); }

    var normalize = function(res, originalTx) {
      if (res && typeof res.serialize === 'function') return res;
      if (res instanceof Uint8Array) return VersionedTransaction.deserialize(res);
      if (res && typeof res.transaction === 'string') return VersionedTransaction.deserialize(b64ToBytes(res.transaction));
      throw new Error('Wallet did not return a signed transaction.');
    };
    return {
      publicKey: pubkey,
      _raw: raw,
      _supportsSignTx: hasSignTx,
      _supportsSignAndSend: hasSignAndSend,
      signTransaction: async function(tx) {
        if (!hasSignTx) throw new Error('SIGN_AND_SEND_REQUIRED');
        return normalize(await raw.signTransaction(tx), tx);
      },
      signAndSendTransaction: async function(tx) {
        if (!hasSignAndSend) throw new Error('Wallet does not support signAndSendTransaction.');
        var res = await raw.signAndSendTransaction(tx);
        if (typeof res === 'string') return res;
        return res && (res.signature || res.txid || null);
      },
    };
  }

  // ============================================================
  // WALLET WIRING
  // ============================================================
  function appKitReady() { return window.VerixiaWallet && typeof window.VerixiaWallet.open === 'function'; }
  function waitForAppKit() {
    return new Promise(function(resolve) {
      if (appKitReady()) return resolve(true);
      var done = false;
      var finish = function(ok) { if (done) return; done = true; resolve(ok); };
      window.addEventListener('verixia-wallet-ready', function() { finish(appKitReady()); }, { once: true });
      var tries = 0;
      var iv = setInterval(function() {
        if (appKitReady()) { clearInterval(iv); finish(true); }
        else if (++tries > 40) { clearInterval(iv); finish(false); }
      }, 100);
    });
  }
  async function openConnect() {
    var ready = await waitForAppKit();
    if (!ready) { setFlash('error', 'Wallet bundle not loaded'); return; }
    try { window.VerixiaWallet.open(); } catch (e) { setFlash('error', 'Could not open wallet: ' + (e && e.message)); }
  }
  async function disconnect() {
    try { if (window.VerixiaWallet && typeof window.VerixiaWallet.disconnect === 'function') await window.VerixiaWallet.disconnect(); }
    catch (e) {}
    S.publicKey = null; S.provider = null; S.walletName = null;
    render();
  }

  async function onWalletStateChange(state) {
    if (state && state.isConnected && state.address) {
      try {
        S.publicKey = new PublicKey(state.address);
        S.walletName = state.walletName || state.providerType || 'Wallet';
        var raw = window.VerixiaWallet.getProvider();
        var tries = 0;
        while (!raw && tries < 20) {
          await new Promise(function(r) { setTimeout(r, 100); });
          raw = window.VerixiaWallet.getProvider();
          tries++;
        }
        S.provider = wrapProvider(raw, S.publicKey);
        render();
        loadConfig();
      } catch (e) {
        console.error('[wallet]', e);
      }
    } else {
      S.publicKey = null; S.provider = null; S.walletName = null;
      render();
    }
  }

  // ============================================================
  // FLASH
  // ============================================================
  var flashTimer = null;
  function setFlash(type, msg) {
    S.flash = { type: type, msg: msg };
    renderFlash();
    if (flashTimer) clearTimeout(flashTimer);
    flashTimer = setTimeout(function() { S.flash = null; renderFlash(); }, 5000);
  }
  function renderFlash() {
    var existing = document.querySelector('.flash');
    if (existing) existing.remove();
    if (!S.flash) return;
    var el = document.createElement('div');
    el.className = 'flash ' + S.flash.type;
    el.textContent = S.flash.msg;
    document.body.appendChild(el);
  }

  // ============================================================
  // RENDER
  // ============================================================
  function updateHeader() {
    var btn = document.getElementById('header-connect');
    if (!btn) return;
    if (S.publicKey) {
      btn.textContent = shortAddr(S.publicKey.toBase58());
      btn.onclick = disconnect;
    } else {
      btn.textContent = 'Connect';
      btn.onclick = openConnect;
    }
  }

  function render() {
    updateHeader();
    var content = document.getElementById('content');
    if (!content) return;

    if (!S.publicKey) {
      content.innerHTML = '<div class="card"><div style="text-align:center;padding:30px 0;color:var(--dim);font-size:13px;line-height:1.6;">Connect the authority wallet to manage the program.<br><br><span style="font-family:\'JetBrains Mono\';font-size:10px;color:var(--faint);">Only the designated authority wallet has access.</span></div></div>';
      return;
    }

    // Owner gate
    if (S.publicKey.toBase58() !== OWNER_WALLET) {
      content.innerHTML = '<div class="card danger"><div class="card-title red">⚠ Access Denied</div><div class="card-desc">Your wallet is not authorized to access this admin panel.</div><div class="row"><span class="row-label">Your wallet</span><span class="row-val mono">' + esc(shortAddr(S.publicKey.toBase58())) + '</span></div><div class="row"><span class="row-label">Required</span><span class="row-val mono">' + esc(shortAddr(OWNER_WALLET)) + '</span></div></div>';
      return;
    }

    if (S.loading) {
      content.innerHTML = '<div class="card"><div style="text-align:center;padding:40px 0;color:var(--dim);font-size:13px;">Loading config…</div></div>';
      return;
    }

    if (!S.config) {
      content.innerHTML = '<div class="card danger"><div class="card-title red">Config not found</div><div class="card-desc">Could not load program config. Is the program initialized? Has the PROGRAM_ID been set in this file?</div></div>';
      return;
    }

    // On-chain authority match check
    if (S.config.authority !== OWNER_WALLET) {
      content.innerHTML = '<div class="card danger"><div class="card-title red">⚠ Authority mismatch</div><div class="card-desc">The on-chain authority does not match the expected owner wallet. Transactions will fail.</div><div class="row"><span class="row-label">Expected</span><span class="row-val mono">' + esc(shortAddr(OWNER_WALLET)) + '</span></div><div class="row"><span class="row-label">On-chain</span><span class="row-val mono">' + esc(shortAddr(S.config.authority)) + '</span></div></div>';
      return;
    }

    content.innerHTML = '';
    renderConfigView(content);
    renderPauseControl(content);
    renderBetLimits(content);
    renderProgramParams(content);
    renderCrankerControl(content);
    renderForceRefund(content);
    renderSweepUnclaimed(content);
    renderSuperSweep(content);
    renderAuthorityTransfer(content);
  }

      '<div class="row"><span class="row-label">Authority</span><span class="row-val mono">' + esc(shortAddr(c.authority)) + '</span></div>' +
      '<div class="row"><span class="row-label">Cranker</span><span class="row-val mono">' + esc(shortAddr(c.cranker)) + '</span></div>' +
      '<div class="row"><span class="row-label">Bet Range</span><span class="row-val">$' + minUsd + ' – $' + maxUsd + '</span></div>' +

  }

  function renderPauseControl(container) {
    var paused = S.config.paused;
    var card = document.createElement('div');
    card.className = 'card' + (paused ? ' danger' : '');
    card.innerHTML = '<div class="card-title ' + (paused ? 'red' : 'green') + '">Pause Control</div>' +
      '<div class="card-desc">' + (paused ? 'Program is paused. No bets or rounds can start.' : 'Program is running normally.') + '</div>' +
      '<button class="btn ' + (paused ? 'green' : 'red') + ' full">' + (paused ? '▶ Unpause Program' : '⏸ Pause Program') + '</button>';
    card.querySelector('button').onclick = function() {
      sendIx(paused ? 'Unpause' : 'Pause', ixSetPaused(!paused));

  }

  function renderBetLimits(container) {
    var c = S.config;
    var minUsd = S.solPrice > 0 ? ((c.minBet / LAMPORTS_PER_SOL) * S.solPrice).toFixed(2) : '';
    var maxUsd = S.solPrice > 0 ? ((c.maxBet / LAMPORTS_PER_SOL) * S.solPrice).toFixed(2) : '';
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="card-title violet">Bet Limits (USD)</div>' +
      '<div class="label">Min Bet (USD)</div>' +
      '<input class="input" data-min type="number" placeholder="1.00" value="' + esc(minUsd) + '">' +
      '<div class="label">Max Bet (USD)</div>' +
      '<input class="input" data-max type="number" placeholder="25.00" value="' + esc(maxUsd) + '">' +
      '<div class="preview" data-preview></div>' +
      '<button class="btn full">Update Bet Limits</button>';
    container.appendChild(card);
    var minEl = card.querySelector('[data-min]');
    var maxEl = card.querySelector('[data-max]');
    var prev = card.querySelector('[data-preview]');
    var btn = card.querySelector('button');
    function update() {
      var minLamports = S.solPrice > 0 ? Math.floor((parseFloat(minEl.value) / S.solPrice) * LAMPORTS_PER_SOL) : 0;
      var maxLamports = S.solPrice > 0 ? Math.floor((parseFloat(maxEl.value) / S.solPrice) * LAMPORTS_PER_SOL) : 0;
      prev.textContent = '→ ' + minLamports.toLocaleString() + ' / ' + maxLamports.toLocaleString() + ' lamports';
      btn.disabled = !(minLamports > 0 && maxLamports >= minLamports);
    }
    minEl.oninput = update; maxEl.oninput = update; update();
    btn.onclick = function() {
      var minLamports = Math.floor((parseFloat(minEl.value) / S.solPrice) * LAMPORTS_PER_SOL);
      var maxLamports = Math.floor((parseFloat(maxEl.value) / S.solPrice) * LAMPORTS_PER_SOL);
      sendIx('Set bet limits', ixSetBetLimits(minLamports, maxLamports));
    };
  }

  function renderProgramParams(container) {
    var c = S.config;
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="card-title violet">Program Parameters</div>' +
      '<div class="card-desc">Tunable game economics. Values clamped on-chain for safety.</div>' +
      '<div class="label">Win Fee (%) — max 90</div>' +
      '<input class="input" data-fee type="number" value="' + (c.feeBps / 100).toFixed(2) + '">' +
      '<div class="label">Round Length (minutes) — 1 min to 24 h</div>' +
      '<input class="input" data-betmin type="number" value="' + (c.bettingDuration / 60).toFixed(2) + '">' +
      '<div class="label">Gap Between Rounds (seconds) — 0 to 3600</div>' +
      '<input class="input" data-gap type="number" value="' + c.gapDuration + '">' +
      '<div class="label">Max Future Rounds — 1 to 100</div>' +
      '<input class="input" data-future type="number" value="' + c.maxFutureRounds + '">' +
      '<div class="label">Claim Window (hours) — 0.17 to 720 h</div>' +
      '<input class="input" data-claim type="number" value="' + (c.claimForfeitDelay / 3600).toFixed(2) + '">' +
      '<div class="label">Force Refund Delay (hours) — 1 to 720 h</div>' +
      '<input class="input" data-refund type="number" value="' + (c.forceRefundDelay / 3600).toFixed(2) + '">' +
      '<button class="btn full">Update Program Parameters</button>';
    container.appendChild(card);
    var fee = card.querySelector('[data-fee]');
    var betmin = card.querySelector('[data-betmin]');
    var gap = card.querySelector('[data-gap]');
    var future = card.querySelector('[data-future]');
    var claim = card.querySelector('[data-claim]');
    var refund = card.querySelector('[data-refund]');
    var btn = card.querySelector('button');
    function validate() {
      var feeBps = Math.round(parseFloat(fee.value) * 100);
      var bettingDuration = Math.round(parseFloat(betmin.value) * 60);
      var gapDuration = Math.round(parseFloat(gap.value));
      var maxFutureRounds = parseInt(future.value, 10);
      var claimForfeitDelay = Math.round(parseFloat(claim.value) * 3600);
      var forceRefundDelay = Math.round(parseFloat(refund.value) * 3600);
      var ok = (feeBps >= 0 && feeBps <= 9000 &&
        bettingDuration >= 60 && bettingDuration <= 86400 &&
        gapDuration >= 0 && gapDuration <= 3600 &&
        maxFutureRounds >= 1 && maxFutureRounds <= 100 &&
        claimForfeitDelay >= 600 && claimForfeitDelay <= 2592000 &&
        forceRefundDelay >= 3600 && forceRefundDelay <= 2592000);
      btn.disabled = !ok;
      return { ok: ok, feeBps: feeBps, bettingDuration: bettingDuration, gapDuration: gapDuration, maxFutureRounds: maxFutureRounds, claimForfeitDelay: claimForfeitDelay, forceRefundDelay: forceRefundDelay };
    }
    [fee, betmin, gap, future, claim, refund].forEach(function(el) { el.oninput = validate; });
    validate();
    btn.onclick = function() {
      var v = validate();
      if (!v.ok) return;
      sendIx('Update program params', ixSetProgramParams(v.feeBps, v.bettingDuration, v.gapDuration, v.maxFutureRounds, v.claimForfeitDelay, v.forceRefundDelay));
    };
  }

  function renderCrankerControl(container) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="card-title violet">Update Cranker Wallet</div>' +
      '<div class="card-desc">Current: <span style="font-family:\'JetBrains Mono\';color:var(--text);">' + esc(shortAddr(S.config.cranker)) + '</span></div>' +
      '<input class="input" data-cranker placeholder="New cranker pubkey">' +
      '<button class="btn full" disabled>Update Cranker</button>';
    container.appendChild(card);
    var inp = card.querySelector('[data-cranker]');
    var btn = card.querySelector('button');
    inp.oninput = function() {
      try { new PublicKey(inp.value.trim()); btn.disabled = false; }
      catch (e) { btn.disabled = true; }
    };
    btn.onclick = function() {
      var pk;
      try { pk = new PublicKey(inp.value.trim()); } catch (e) { return; }
      sendIx('Update cranker', ixSetCranker(pk));
    };
  }

  function renderForceRefund(container) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="card-title gold">Force Refund Stuck Round</div>' +
      '<div class="card-desc">Marks a stuck round as a tie so users can refund. Allowed only after the force-refund delay.</div>' +
      '<input class="input" data-epoch type="number" placeholder="Round number">' +
      '<button class="btn gold full" disabled>Force Refund</button>';
    container.appendChild(card);
    var inp = card.querySelector('[data-epoch]');
    var btn = card.querySelector('button');
    inp.oninput = function() { btn.disabled = !(parseInt(inp.value, 10) > 0); };
    btn.onclick = function() {
      var e = parseInt(inp.value, 10);
      if (!e || e <= 0) return;
      sendIx('Force refund #' + e, ixForceRefund(e));
    };
  }

  function renderSweepUnclaimed(container) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="card-title gold">Sweep Unclaimed Winnings</div>' +
      '<div class="card-desc">Pulls forfeited winnings to authority after the claim window expires.</div>' +
      '<input class="input" data-epoch type="number" placeholder="Round number">' +
      '<button class="btn gold full" disabled>Sweep Round</button>';
    container.appendChild(card);
    var inp = card.querySelector('[data-epoch]');
    var btn = card.querySelector('button');
    inp.oninput = function() { btn.disabled = !(parseInt(inp.value, 10) > 0); };
    btn.onclick = function() {
      var e = parseInt(inp.value, 10);
      if (!e || e <= 0) return;
      sendIx('Sweep unclaimed #' + e, ixSweepUnclaimed(e));
    };
  }

  function renderSuperSweep(container) {
    var card = document.createElement('div');
    card.className = 'card danger';
    card.innerHTML = '<div class="card-title red">Super Sweep (Emergency)</div>' +
      '<div class="card-desc">⚠️ Bypasses the claim delay. Pulls everything in the round vault to authority immediately.</div>' +
      '<input class="input" data-epoch type="number" placeholder="Round number">' +
      '<label class="check"><input type="checkbox" data-confirm>I understand this bypasses safety delays</label>' +
      '<button class="btn red full" disabled>Super Sweep</button>';
    container.appendChild(card);
    var inp = card.querySelector('[data-epoch]');
    var cb = card.querySelector('[data-confirm]');
    var btn = card.querySelector('button');
    function update() { btn.disabled = !(parseInt(inp.value, 10) > 0 && cb.checked); }
    inp.oninput = update; cb.onchange = update;
    btn.onclick = function() {
      var e = parseInt(inp.value, 10);
      if (!e || e <= 0 || !cb.checked) return;
      sendIx('Super sweep #' + e, ixSuperSweep(e));
    };
  }

  function renderAuthorityTransfer(container) {
    var card = document.createElement('div');
    card.className = 'card danger';
    card.innerHTML = '<div class="card-title red">Transfer Authority</div>' +
      '<div class="card-desc">⚠️ Hands full control of the program to another wallet. Only the new authority can transfer it back. <b>You will lose access to this admin page.</b></div>' +
      '<input class="input" data-newauth placeholder="New authority pubkey">' +
      '<label class="check"><input type="checkbox" data-confirm>I understand this transfers full control</label>' +
      '<button class="btn red full" disabled>Transfer Authority</button>';
    container.appendChild(card);
    var inp = card.querySelector('[data-newauth]');
    var cb = card.querySelector('[data-confirm]');
    var btn = card.querySelector('button');
    function update() {
      var ok = false;
      try { new PublicKey(inp.value.trim()); ok = true; } catch (e) {}
      btn.disabled = !(ok && cb.checked);
    }
    inp.oninput = update; cb.onchange = update;
    btn.onclick = function() {
      var pk;
      try { pk = new PublicKey(inp.value.trim()); } catch (e) { return; }
      if (!cb.checked) return;
      sendIx('Transfer authority', ixSetAuthority(pk));
    };
  }

  // ============================================================
  // INIT
  // ============================================================
  async function init() {
    if (CFG.programId === 'REPLACE_WITH_PROGRAM_ID') {
      var c = document.getElementById('content');
      c.innerHTML = '<div class="card danger"><div class="card-title red">Not configured</div><div class="card-desc">Open <code>flipsy-admin.html</code> and replace <code>REPLACE_WITH_PROGRAM_ID</code> with your deployed program ID.</div></div>';
      return;
    }
    await computeDiscriminators();
    pollPrice();
    setInterval(pollPrice, 5000);
    render();
    waitForAppKit().then(function(ok) {
      if (!ok) {
        console.warn('[admin] Wallet bundle not loaded');
        return;
      }
      window.VerixiaWallet.subscribe(onWalletStateChange);
    });
    // Refresh config every 10s when connected
    setInterval(function() { if (S.publicKey) loadConfig(); }, 10000);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
}

// LOADER — fetch solana web3 from CDN with fallback (same as swap page)
// ============================================================
(function () {
  "use strict";
  function fail() {
    var c = document.getElementById('content');
    if (c) c.innerHTML = '<div class="card danger"><div class="card-title red">Library load failed</div><div class="card-desc">Could not load Solana web3 library. Check your connection.</div></div>';
  }
  function go() { if (window.solanaWeb3) { try { __flipsyAdmin(); } catch (e) { console.error('[flipsy-admin]', e); } } else fail(); }
  function load(src, ok, err) {
    var s = document.createElement('script');
    s.src = src; s.async = false; s.onload = ok; s.onerror = err;
    document.head.appendChild(s);
  }
  if (window.solanaWeb3) { go(); return; }
  load('https://cdn.jsdelivr.net/npm/@solana/web3.js@1/lib/index.iife.min.js', go, function () {
    load('https://unpkg.com/@solana/web3.js@1/lib/index.iife.min.js', go, fail);
  });
})();
