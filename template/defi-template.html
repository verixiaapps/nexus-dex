     REPLACE the existing <script>function __verixiaApp() { ... }</script>
     block (the big one starting with "SWAP WIDGET — Vanilla port aligned to
     SwapWidget.jsx") with EVERYTHING below, up to and including the loader
     IIFE at the bottom. Leave the CONFIG block above it (window.__VERIXIA_CONFIG__)
     and everything else in the file alone.

     FIXES IN THIS VERSION:
       1. Balances no longer show 0 when wallet has funds.
          Each RPC call is wrapped independently (Promise.allSettled style)
          so a throttled getParsedTokenAccountsByOwner can't kill getBalance.
       2. Header button toggles: tap when connected -> account menu w/ Disconnect.
          Disconnect also cancels Phantom auto-reconnect for the session.
       3. WalletConnect (works for ALL WC-compatible wallets, not just Trust):
          - metadata.icons populated. Wallets' verify step silently rejects
            sessions whose metadata has no icons array, which is the #1
            cause of "deep link opens wallet but no approval sheet" across
            Trust, OKX, Bitget, Coin98, etc.
          - optionalNamespaces (instead of required) so wallets can fulfill
            a subset of methods. Required namespaces is the #2 cause of
            silent rejection — most Solana WC wallets implement EITHER
            solana_signTransaction OR solana_signAndSendTransaction, not
            both. Required mode forces them to reject if any one is missing.
          - Both CAIP-2 mainnet chain IDs declared (current + legacy
            mainnet-beta) so older wallets that haven't updated still match.
          - All four common Solana methods offered (signTransaction,
            signAndSendTransaction, signAllTransactions, signMessage).
          - handleSwap now branches: if the wallet only supports
            sign-and-send, we hand the tx to the wallet to broadcast
            instead of trying to sign locally and send ourselves.
          - Trust Wallet's injected provider (window.trustwallet.solana)
            is also detected directly when the user is inside Trust's
            in-app browser, bypassing WC entirely for that case.
          - 90s connection timeout so a stalled WC session can't hang.
   ========================================================================= -->

<script>
function __verixiaApp() {
  "use strict";
  var solanaWeb3 = window.solanaWeb3;
  var Connection = solanaWeb3.Connection;
  var PublicKey = solanaWeb3.PublicKey;
  var VersionedTransaction = solanaWeb3.VersionedTransaction;
  var TransactionMessage = solanaWeb3.TransactionMessage;
  var SystemProgram = solanaWeb3.SystemProgram;
  var AddressLookupTableAccount = solanaWeb3.AddressLookupTableAccount;
  var TransactionInstruction = solanaWeb3.TransactionInstruction;

  /* base64 helpers */
  var b64ToBytes = function(b64) { return Uint8Array.from(atob(b64), function(c) { return c.charCodeAt(0); }); };
  var bytesToB64 = function(u8) { var s = ''; for (var i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]); return btoa(s); };

  /* SPL TOKEN (hand-rolled) */
  var TOKEN_PROGRAM_ID       = new PublicKey('TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA');
  var TOKEN_2022_PROGRAM_ID  = new PublicKey('TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb');
  var ASSOC_TOKEN_PROGRAM_ID = new PublicKey('ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL');

  function getAssociatedTokenAddressSync(mint, owner, _allowOffCurve, programId) {
    return PublicKey.findProgramAddressSync(
      [owner.toBuffer(), (programId || TOKEN_PROGRAM_ID).toBuffer(), mint.toBuffer()],
      ASSOC_TOKEN_PROGRAM_ID
    )[0];
  }
  function createAssociatedTokenAccountIdempotentInstruction(payer, ata, owner, mint, programId) {
    return new TransactionInstruction({
      programId: ASSOC_TOKEN_PROGRAM_ID,
      keys: [
        { pubkey: payer, isSigner: true,  isWritable: true  },
        { pubkey: ata,   isSigner: false, isWritable: true  },
        { pubkey: owner, isSigner: false, isWritable: false },
        { pubkey: mint,  isSigner: false, isWritable: false },
        { pubkey: SystemProgram.programId,       isSigner: false, isWritable: false },
        { pubkey: programId || TOKEN_PROGRAM_ID, isSigner: false, isWritable: false },
      ],
      data: Uint8Array.of(1),
    });
  }
  function createTransferCheckedInstruction(source, mint, dest, owner, amount, decimals, _multi, programId) {
    var data = new Uint8Array(10);
    data[0] = 12;
    var v = BigInt(amount);
    for (var i = 0; i < 8; i++) { data[1 + i] = Number(v & 0xffn); v >>= 8n; }
    data[9] = decimals & 0xff;
    return new TransactionInstruction({
      programId: programId || TOKEN_PROGRAM_ID,
      keys: [
        { pubkey: source, isSigner: false, isWritable: true  },
        { pubkey: mint,   isSigner: false, isWritable: false },
        { pubkey: dest,   isSigner: false, isWritable: true  },
        { pubkey: owner,  isSigner: true,  isWritable: false },
      ],
      data: data,
    });
  }

  /* CONFIG */
  var RUNTIME_CFG = (typeof window !== 'undefined' && window.__VERIXIA_CONFIG__) || {};

  /* RPC pool. Tries the configured RPC first, then falls back across public
     endpoints. Different public RPCs throttle/allow different methods, so
     iterating until one returns wins us reliability without needing a paid key. */
  var RPC_POOL = [
    RUNTIME_CFG.rpc,
    'https://solana-rpc.publicnode.com',
    'https://rpc.ankr.com/solana',
    'https://api.mainnet-beta.solana.com',
  ].filter(Boolean).filter(function(v, i, a) { return a.indexOf(v) === i; });
  var RPC_URL = RPC_POOL[0];

  var FEE_WALLET = new PublicKey('Dd6bKf6SXYQfs24M8evyTXo1MdYrZgbxhk6wWby8NRFV');
  var FEE_BPS    = 300;
  var SOL_MINT   = 'So11111111111111111111111111111111111111112';
  var USDC_MINT  = 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v';
  var PRIORITY_FEE_MICROLAMPORTS = 50000;
  var SLIPPAGE_BPS = 500;
  var DISCONNECT_FLAG = 'verixia:disconnected';

  /* HELPERS */
  var fmtAmount = function(n, decimals) {
    decimals = decimals || 6;
    if (n == null || isNaN(n)) return '0';
    var num = Number(n);
    if (num === 0) return '0';
    if (num < 0.000001) return num.toExponential(2);
    if (num < 1)        return num.toFixed(Math.min(6, decimals));
    if (num < 1000)     return num.toFixed(Math.min(4, decimals));
    if (num < 1000000)  return num.toLocaleString('en-US', { maximumFractionDigits: 2 });
    return (num / 1000000).toFixed(2) + 'M';
  };

  var friendlyError = function(err) {
    var m = String(err && err.message || err || '').toLowerCase();
    if (m.includes('insufficient'))      return 'Insufficient balance for this swap.';
    if (m.includes('slippage'))          return 'Price moved too much. Try again or increase slippage.';
    if (m.includes('blockhash') || m.includes('expired')) return 'Transaction expired. Please try again.';
    if (m.includes('user reject') || m.includes('user denied') || m.includes('user cancelled')) return 'Transaction cancelled.';
    if (m.includes('simulation failed')) return 'Swap simulation failed \u2014 the price may have moved.';
    if (m.includes('account not'))       return 'Token account not ready. Please try again in a moment.';
    if (m.includes('rate'))              return 'Too many requests \u2014 please wait a moment.';
    if (m.includes('could not find any route') || m.includes('no route')) return 'No route available for this pair.';
    if (m.includes('too large') || m.includes('transaction too large')) return 'Route is too complex to fit in one transaction. Try a different amount or token.';
    return (err && err.message) || 'Swap failed. Please try again.';
  };

  var deserIx = function(ix) {
    return {
      programId: new PublicKey(ix.programId),
      keys: ix.accounts.map(function(a) {
        return { pubkey: new PublicKey(a.pubkey), isSigner: a.isSigner, isWritable: a.isWritable };
      }),
      data: b64ToBytes(ix.data),
    };
  };

  var esc = function(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  }); };

  /* WALLET LAYER */
  // CAIP-2 chain IDs. Newer wallets use the first; some older/edge ones still
  // register the legacy mainnet-beta ID. Declaring both maximizes compat.
  var SOLANA_WC_CHAIN        = 'solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp';
  var SOLANA_WC_CHAIN_LEGACY = 'solana:4sGjMW1sUnHzSxGspuhpqLDx6wiyjNtZ';

  /* === FIX #3a: Trust Wallet (and any other Solana-injecting wallet) now
     detected as an injected provider so we never have to do Solana-over-WC
     when the user is already inside a wallet's in-app browser. === */
  function injectedProviders() {
    var w = (typeof window !== 'undefined') ? window : {};
    var out = [];
    var phantom = (w.phantom && w.phantom.solana && w.phantom.solana.isPhantom) ? w.phantom.solana
                : (w.solana && w.solana.isPhantom) ? w.solana : null;
    if (phantom) out.push({ id: 'phantom', name: 'Phantom', provider: phantom });
    var solflare = (w.solflare && w.solflare.isSolflare) ? w.solflare : null;
    if (solflare) out.push({ id: 'solflare', name: 'Solflare', provider: solflare });
    var backpack = (w.backpack && w.backpack.isBackpack) ? w.backpack : null;
    if (backpack) out.push({ id: 'backpack', name: 'Backpack', provider: backpack });
    var trust = (w.trustwallet && w.trustwallet.solana) ? w.trustwallet.solana
              : (w.solana && w.solana.isTrust) ? w.solana
              : (w.solana && w.solana.isTrustWallet) ? w.solana : null;
    if (trust && !out.find(function(x){ return x.provider === trust; })) {
      out.push({ id: 'trust', name: 'Trust Wallet', provider: trust });
    }
    return out;
  }
  function getPhantom() { return (injectedProviders().find(function(x) { return x.id === 'phantom'; }) || {}).provider || null; }
  function getInjectedById(id) { return (injectedProviders().find(function(x) { return x.id === id; }) || null); }

  /* STATE */
  var connection = new Connection(RPC_URL, 'confirmed');
  var S = {
    provider: null, publicKey: null, walletName: null,
    tokens: [], tokensLoading: true,
    inputMint: SOL_MINT, outputMint: USDC_MINT, amount: '',
    quote: null, quoting: false, quoteError: null,
    swapping: false, swapError: null, swapResult: null, balances: {},
    balancesLoading: false,
  };
  var root, els = {};

  /* TOKEN LIST */
  async function loadTokens() {
    try {
      var r = await fetch('https://lite-api.jup.ag/tokens/v2/tag?query=verified');
      var data = await r.json();
      var list = Array.isArray(data) ? data : (data && data.tokens || []);
      var norm = list.map(function(t) { return {
        address: t.id || t.address || t.mint, symbol: t.symbol, name: t.name,
        decimals: t.decimals, logoURI: t.icon || t.logoURI || null,
      }; }).filter(function(t) { return t.address && t.symbol && t.decimals != null; });
      S.tokens = norm.length ? norm : fallbackTokens();
    } catch (e) {
      console.warn('[swap] token list failed', e);
      S.tokens = fallbackTokens();
    } finally {
      S.tokensLoading = false;
      renderRows();
    }
  }
  function fallbackTokens() {
    return [
      { address: SOL_MINT,  symbol: 'SOL',  name: 'Solana',   decimals: 9, logoURI: null },
      { address: USDC_MINT, symbol: 'USDC', name: 'USD Coin', decimals: 6, logoURI: null },
    ];
  }
  var tokenBy = function(mint) { return S.tokens.find(function(t) { return t.address === mint; }) || null; };

  /* === FIX #1: Balances. Each RPC call runs across a pool of public RPCs.
     If one rejects/throttles, we fall through to the next. SOL is always
     populated (even as 0) so the UI shows a real number instead of being
     stuck on "Balance: 0 SOL" caused by an empty balances object. === */

  // Try a given Connection method across the RPC pool. Returns on first success;
  // throws only if ALL pool entries fail.
  async function rpcFallback(label, op) {
    var lastErr = null;
    for (var i = 0; i < RPC_POOL.length; i++) {
      var url = RPC_POOL[i];
      try {
        var conn = (url === RPC_URL) ? connection : new Connection(url, 'confirmed');
        return await op(conn);
      } catch (e) {
        lastErr = e;
        console.warn('[rpc] ' + label + ' failed on ' + url + ':', e && e.message);
      }
    }
    throw lastErr || new Error(label + ': all RPCs failed');
  }

  function mergeTokenAccounts(out, accs) {
    if (!accs || !accs.value) return;
    for (var i = 0; i < accs.value.length; i++) {
      var acc = accs.value[i];
      var info = acc.account && acc.account.data && acc.account.data.parsed && acc.account.data.parsed.info;
      if (!info) continue;
      var mint = info.mint;
      var amt = info.tokenAmount && info.tokenAmount.amount;
      var dec = info.tokenAmount && info.tokenAmount.decimals;
      var uiAmt = info.tokenAmount && info.tokenAmount.uiAmount;
      if (!mint || amt == null) continue;
      out[mint] = { amount: Number(amt), decimals: dec, uiAmount: uiAmt };
    }
  }

  async function refreshBalances() {
    if (!S.publicKey) { S.balances = {}; S.balancesLoading = false; renderRows(); return; }
    S.balancesLoading = true;
    renderRows();
    var owner = S.publicKey;
    var out = {};

    // 1) SOL — try across the RPC pool. Almost every public RPC supports getBalance,
    //    so this almost always succeeds.
    try {
      var solBal = await rpcFallback('getBalance', function(c) { return c.getBalance(owner, 'confirmed'); });
      out[SOL_MINT] = { amount: solBal, decimals: 9, uiAmount: solBal / 1e9 };
    } catch (e) { console.warn('[swap] SOL balance failed across all RPCs:', e && e.message); }

    // 2) SPL tokens — getParsedTokenAccountsByOwner is the call most likely to be
    //    throttled. Falling back across the pool dramatically improves hit rate.
    try {
      var tokenAccs = await rpcFallback('getParsedTokenAccountsByOwner(Token)', function(c) {
        return c.getParsedTokenAccountsByOwner(owner, { programId: TOKEN_PROGRAM_ID }, 'confirmed');
      });
      mergeTokenAccounts(out, tokenAccs);
    } catch (e) { console.warn('[swap] SPL token accounts failed across all RPCs:', e && e.message); }

    // 3) Token-2022 — same treatment.
    try {
      var token22Accs = await rpcFallback('getParsedTokenAccountsByOwner(Token2022)', function(c) {
        return c.getParsedTokenAccountsByOwner(owner, { programId: TOKEN_2022_PROGRAM_ID }, 'confirmed');
      });
      mergeTokenAccounts(out, token22Accs);
    } catch (e) { console.warn('[swap] Token-2022 accounts failed across all RPCs:', e && e.message); }

    if (!out[SOL_MINT]) out[SOL_MINT] = { amount: 0, decimals: 9, uiAmount: 0 };

    S.balances = out;
    S.balancesLoading = false;
    renderRows();
  }

  /* DERIVED */
  function rawAmount() {
    var inputToken = tokenBy(S.inputMint);
    if (!S.amount || !inputToken) return '';
    var n = Number(S.amount);
    if (!Number.isFinite(n) || n <= 0) return '';
    return Math.floor(n * Math.pow(10, inputToken.decimals)).toString();
  }
  function outAmountUi() {
    var outputToken = tokenBy(S.outputMint);
    if (!S.quote || !outputToken) return null;
    return Number(S.quote.outAmount) / Math.pow(10, outputToken.decimals);
  }
  function minReceived() {
    var outputToken = tokenBy(S.outputMint);
    if (!S.quote || !outputToken) return null;
    return Number(S.quote.otherAmountThreshold) / Math.pow(10, outputToken.decimals);
  }
  function priceImpact() {
    if (!S.quote || S.quote.priceImpactPct == null) return null;
    var n = Number(S.quote.priceImpactPct);
    return Number.isFinite(n) ? n * (Math.abs(n) <= 1 ? 100 : 1) : null;
  }

  /* QUOTE */
  var quoteAbort = null;
  var quoteTimer = null;
  function scheduleQuote() {
    var raw = rawAmount();
    if (!raw || S.inputMint === S.outputMint) {
      S.quote = null; S.quoteError = null; S.quoting = false;
      renderDetails(); renderButton(); renderRows(); return;
    }
    if (quoteAbort) quoteAbort.abort();
    if (quoteTimer) clearTimeout(quoteTimer);
    var ac = new AbortController();
    quoteAbort = ac;
    S.quoting = true; S.quoteError = null;
    renderButton(); renderRows();

    quoteTimer = setTimeout(async function() {
      try {
        var net = (BigInt(raw) * BigInt(10000 - FEE_BPS)) / 10000n;
        if (net <= 0n) { S.quote = null; S.quoting = false; renderAll(); return; }
        var params = new URLSearchParams({
          inputMint:  S.inputMint,
          outputMint: S.outputMint,
          amount:     net.toString(),
          slippageBps: String(SLIPPAGE_BPS),
          taker: S.publicKey ? S.publicKey.toBase58() : '11111111111111111111111111111111',
          computeUnitPriceMicroLamports: String(PRIORITY_FEE_MICROLAMPORTS),
        });
        var r = await fetch('https://api.jup.ag/swap/v2/build?' + params.toString(), { signal: ac.signal });
        if (!r.ok) {
          var body = await r.json().catch(function() { return {}; });
          throw new Error(body.error || ('Quote failed (' + r.status + ')'));
        }
        var data = await r.json();
        if (!ac.signal.aborted) { S.quote = data; S.quoteError = null; }
      } catch (e) {
        if (e.name === 'AbortError') return;
        if (!ac.signal.aborted) { S.quote = null; S.quoteError = friendlyError(e); }
      } finally {
        if (!ac.signal.aborted) { S.quoting = false; renderAll(); }
      }
    }, 350);
  }

  /* ACTIONS */
  function flip() {
    var i = S.inputMint;
    S.inputMint = S.outputMint; S.outputMint = i;
    S.amount = ''; S.quote = null;
    renderAll(); scheduleQuote();
  }
  function setMax() {
    var bal = S.balances[S.inputMint];
    if (!bal) return;
    var maxAmt = bal.uiAmount;
    if (S.inputMint === SOL_MINT) maxAmt = Math.max(0, maxAmt - 0.01);
    S.amount = String(maxAmt);
    renderRows(); scheduleQuote();
  }

  /* === FIX #2: Disconnect. Header button now toggles, account menu has a
     Disconnect action, and a session flag prevents Phantom from auto-
     reconnecting after the user has explicitly disconnected. === */
  async function disconnect() {
    try {
      if (S.provider && S.provider._wc && typeof S.provider._wc.disconnect === 'function') {
        await S.provider._wc.disconnect();
      } else if (S.provider && typeof S.provider.disconnect === 'function') {
        await S.provider.disconnect();
      }
    } catch (e) { console.warn('[disconnect]', e && e.message); }
    try { sessionStorage.setItem(DISCONNECT_FLAG, '1'); } catch (e) {}
    S.provider = null;
    S.publicKey = null;
    S.walletName = null;
    S.balances = {};
    S.quote = null;
    S.amount = '';
    if (els.amount) els.amount.value = '';
    closeAccountMenu();
    renderAll();
  }

  /* WALLET — injected */
  async function connectInjected(entry) {
    try {
      try { sessionStorage.removeItem(DISCONNECT_FLAG); } catch (e) {}
      var res = await entry.provider.connect();
      S.provider = entry.provider;
      S.walletName = entry.name;
      S.publicKey = new PublicKey((res && res.publicKey || entry.provider.publicKey).toString());
      attachProviderEvents(entry.provider);
      renderAll(); refreshBalances(); scheduleQuote();
    } catch (e) {
      S.swapError = /reject|cancel|denied|user/i.test(String(e && e.message)) ? 'Connection cancelled.' : (e && e.message || 'Failed to connect.');
      renderBanners();
    }
  }

  /* WALLET — WalletConnect */
  var WC_SDK_LOADING = null;
  function loadWCSDK() {
    if (WC_SDK_LOADING) return WC_SDK_LOADING;
    if (window.__VerixiaWC && window.__VerixiaWC.UniversalProvider && window.__VerixiaWC.WalletConnectModal && window.__VerixiaWC.bs58) {
      return Promise.resolve(window.__VerixiaWC);
    }
    WC_SDK_LOADING = new Promise(function(resolve, reject) {
      var CDN_PRIMARY  = 'https://cdn.jsdelivr.net/npm';
      var CDN_FALLBACK = 'https://unpkg.com';
      var scripts = [
        { id: 'bs58',  primary: CDN_PRIMARY+'/bs58@5.0.0/index.min.js',                              fallback: CDN_FALLBACK+'/bs58@5.0.0/index.min.js' },
        { id: 'wcup',  primary: CDN_PRIMARY+'/@walletconnect/universal-provider@2.17.0/dist/index.umd.js', fallback: CDN_FALLBACK+'/@walletconnect/universal-provider@2.17.0/dist/index.umd.js' },
        { id: 'wcm',   primary: CDN_PRIMARY+'/@walletconnect/modal@2.7.0/dist/index.umd.js',           fallback: CDN_FALLBACK+'/@walletconnect/modal@2.7.0/dist/index.umd.js' },
      ];
      var loadOne = function(spec) {
        return new Promise(function(res, rej) {
          var tryLoad = function(url, onFail) {
            var s = document.createElement('script');
            s.src = url; s.async = false; s.crossOrigin = 'anonymous';
            s.onload  = function() { res(); };
            s.onerror = function() { onFail(); };
            document.head.appendChild(s);
          };
          tryLoad(spec.primary, function() { tryLoad(spec.fallback, function() { rej(new Error('Failed to load ' + spec.id)); }); });
        });
      };
      (async function() {
        try {
          for (var i = 0; i < scripts.length; i++) await loadOne(scripts[i]);
          var w = window;
          var UniversalProvider =
            (w.UniversalProvider && (w.UniversalProvider.default || w.UniversalProvider)) ||
            (w['@walletconnect/universal-provider'] && (w['@walletconnect/universal-provider'].UniversalProvider || w['@walletconnect/universal-provider'].default)) ||
            null;
          var WalletConnectModal =
            (w.WalletConnectModal && (w.WalletConnectModal.WalletConnectModal || w.WalletConnectModal.default || w.WalletConnectModal)) ||
            (w['@walletconnect/modal'] && (w['@walletconnect/modal'].WalletConnectModal || w['@walletconnect/modal'].default)) ||
            null;
          var bs58 = w.bs58 && (w.bs58.default || w.bs58);
          if (!UniversalProvider) throw new Error('UniversalProvider global not found');
          if (!WalletConnectModal) throw new Error('WalletConnectModal global not found');
          if (!bs58 || !bs58.decode) throw new Error('bs58 global not found');
          window.__VerixiaWC = { UniversalProvider: UniversalProvider, WalletConnectModal: WalletConnectModal, bs58: bs58 };
          resolve(window.__VerixiaWC);
        } catch (e) { WC_SDK_LOADING = null; reject(e); }
      })();
    });
    return WC_SDK_LOADING;
  }

  async function connectWalletConnect() {
    var projectId = RUNTIME_CFG.wcProjectId;
    if (!projectId) { S.swapError = 'WalletConnect not configured.'; renderBanners(); return; }
    try {
      try { sessionStorage.removeItem(DISCONNECT_FLAG); } catch (e) {}
      var sdk = await loadWCSDK();
      var UniversalProvider  = sdk.UniversalProvider;
      var WalletConnectModal = sdk.WalletConnectModal;
      var bs58               = sdk.bs58;
      var origin = window.location.origin;

      /* === FIX #3b: metadata.icons populated. Wallets' verify step (and
         the Reown verify service) silently reject sessions whose metadata
         has no icons array — which is why the deep link opens the wallet
         but no approval sheet ever shows up. === */
      var wc = await UniversalProvider.init({
        projectId: projectId,
        metadata: {
          name: 'Verixia',
          description: 'Bridge & swap on Solana via Jupiter',
          url: origin,
          icons: [origin + '/favicon.ico', origin + '/icon-192.png', origin + '/icon-512.png'],
        },
      });
      var modal = new WalletConnectModal({
        projectId: projectId,
        chains:    [SOLANA_WC_CHAIN, SOLANA_WC_CHAIN_LEGACY],
        themeMode: 'dark',
      });
      wc.on('display_uri', function(uri) { try { modal.openModal({ uri: uri }); } catch(e) {} });

      /* === FIX #3c: optionalNamespaces (not "namespaces") + both chain IDs
         + all common Solana methods. Using REQUIRED namespaces is what
         causes most wallets to silently reject the session — a wallet
         must support every listed method, and many Solana WC wallets only
         implement signAndSendTransaction OR signTransaction, never both.
         optionalNamespaces lets each wallet fulfill what it supports. === */
      var session;
      try {
        session = await Promise.race([
          wc.connect({
            optionalNamespaces: {
              solana: {
                chains: [SOLANA_WC_CHAIN, SOLANA_WC_CHAIN_LEGACY],
                methods: [
                  'solana_signTransaction',
                  'solana_signAndSendTransaction',
                  'solana_signAllTransactions',
                  'solana_signMessage',

        ]);

      var acct = sns && sns.accounts && sns.accounts[0];
      if (!acct) throw new Error('WalletConnect returned no Solana account.');

      // Capture the chain the wallet actually picked and which methods it agreed to.
      var parts = acct.split(':');                       // ["solana", "<chainHash>", "<pubkey>"]
      var sessionChain = parts.slice(0, 2).join(':');    // "solana:<chainHash>"
      var pubkey = new PublicKey(parts[parts.length - 1]);
      var methods = (sns.methods || []).slice();
      var hasSignTx      = methods.indexOf('solana_signTransaction') !== -1;
      var hasSignAndSend = methods.indexOf('solana_signAndSendTransaction') !== -1;
      if (!hasSignTx && !hasSignAndSend) {
        throw new Error('Wallet did not authorize any signing method. Try a different wallet.');
      }

      S.publicKey = pubkey; S.walletName = 'WalletConnect';
      S.provider = {
        publicKey: pubkey,
        _wc: wc,
        _chain: sessionChain,
        _methods: methods,
        _supportsSignTx: hasSignTx,
        _supportsSignAndSend: hasSignAndSend,
        signTransaction: async function(tx) {
          var b64 = bytesToB64(tx.serialize());
          if (hasSignTx) {
            var res = await wc.request({ method: 'solana_signTransaction', params: { transaction: b64 } }, sessionChain);
            if (res && res.transaction) return VersionedTransaction.deserialize(b64ToBytes(res.transaction));
            if (res && res.signature) { tx.addSignature(pubkey, bs58.decode(res.signature)); return tx; }

          // Caller will fall back to signAndSend via the dedicated method below.
          throw new Error('SIGN_AND_SEND_REQUIRED');

        signAndSendTransaction: async function(tx) {
          var b64 = bytesToB64(tx.serialize());

        },
      };

  /* SWAP */
  async function handleSwap() {
    var inputToken  = tokenBy(S.inputMint);
    var outputToken = tokenBy(S.outputMint);
    if (!S.publicKey || !S.provider || !S.provider.signTransaction) {
      S.swapError = 'Please connect a wallet (Phantom, Solflare, Backpack).'; renderBanners(); return;
    }
    if (!S.quote || !outputToken || !inputToken) {
      S.swapError = 'No quote available \u2014 try again.'; renderBanners(); return;
    }

    S.swapping = true; S.swapError = null; S.swapResult = null;
    renderButton(); renderBanners();

    try {
      var dec = inputToken.decimals;
      var build = S.quote;
      var raw = rawAmount();

      var feeAmount = (BigInt(raw) * BigInt(FEE_BPS)) / 10000n;
      if (feeAmount <= 0n) throw new Error('Fee amount rounds to zero \u2014 amount too small.');

      var feeIxs = [];
      if (S.inputMint === SOL_MINT) {
        feeIxs.push(SystemProgram.transfer({
          fromPubkey: S.publicKey, toPubkey: FEE_WALLET, lamports: Number(feeAmount),
        }));
      } else {
        var mintPk = new PublicKey(S.inputMint);
        var mintInfo = await connection.getAccountInfo(mintPk);
        if (!mintInfo) throw new Error('Input mint not found on-chain.');
        var tokenProgram = mintInfo.owner.equals(TOKEN_2022_PROGRAM_ID) ? TOKEN_2022_PROGRAM_ID : TOKEN_PROGRAM_ID;
        var sourceAta = getAssociatedTokenAddressSync(mintPk, S.publicKey, true, tokenProgram);
        var destAta   = getAssociatedTokenAddressSync(mintPk, FEE_WALLET,  true, tokenProgram);
        feeIxs.push(createAssociatedTokenAccountIdempotentInstruction(S.publicKey, destAta, FEE_WALLET, mintPk, tokenProgram));
        feeIxs.push(createTransferCheckedInstruction(sourceAta, mintPk, destAta, S.publicKey, feeAmount, dec, [], tokenProgram));
      }

      var ixs = [];
      if (Array.isArray(build.computeBudgetInstructions))
        for (var ci = 0; ci < build.computeBudgetInstructions.length; ci++) ixs.push(deserIx(build.computeBudgetInstructions[ci]));
      for (var fi = 0; fi < feeIxs.length; fi++) ixs.push(feeIxs[fi]);
      if (Array.isArray(build.setupInstructions))
        for (var si = 0; si < build.setupInstructions.length; si++) ixs.push(deserIx(build.setupInstructions[si]));
      if (build.swapInstruction) ixs.push(deserIx(build.swapInstruction));
      if (build.cleanupInstruction) ixs.push(deserIx(build.cleanupInstruction));
      if (Array.isArray(build.otherInstructions))
        for (var oi = 0; oi < build.otherInstructions.length; oi++) ixs.push(deserIx(build.otherInstructions[oi]));

      var altKeys = Object.keys(build.addressesByLookupTableAddress || {});
      var alts = [];
      if (altKeys.length > 0) {
        var infos = await connection.getMultipleAccountsInfo(altKeys.map(function(k) { return new PublicKey(k); }));
        alts = altKeys.map(function(k, i) {
          return infos[i] ? new AddressLookupTableAccount({
            key: new PublicKey(k),
            state: AddressLookupTableAccount.deserialize(infos[i].data),
          }) : null;
        }).filter(Boolean);
      }

      var latest = await connection.getLatestBlockhash('confirmed');
      var message = new TransactionMessage({
        payerKey: S.publicKey, recentBlockhash: latest.blockhash, instructions: ixs,
      }).compileToV0Message(alts);
      var tx = new VersionedTransaction(message);

      var mapSimErr = function(logs) {
        var j = (logs || []).join('\n').toLowerCase();
        if (j.includes('insufficient') || j.includes('0x1')) return 'Insufficient balance for this swap.';
        if (j.includes('slippage') || j.includes('0x1771')) return 'Price moved \u2014 try a higher slippage or smaller amount.';
        if (j.includes('account not') || j.includes('uninitialized')) return 'Token account not ready. Try again in a moment.';
        if (j.includes('blockhash') || j.includes('expired')) return 'Quote expired. Please refresh and retry.';
        return null;
      };
      try {
        var sim = await connection.simulateTransaction(tx, { replaceRecentBlockhash: true, sigVerify: false });
        if (sim.value.err) throw new Error(mapSimErr(sim.value.logs) || 'Swap simulation failed \u2014 the price may have moved.');
      } catch (simErr) {
        if (simErr && simErr.message && /balance|slippage|simulation failed|account not|expired/i.test(simErr.message)) throw simErr;
        console.warn('[swap] sim non-fatal', simErr);
      }

      var signed, sig;
      if (S.provider._supportsSignAndSend && !S.provider._supportsSignTx) {
        // Wallet only does sign-and-send (some mobile WC wallets) — it broadcasts internally.
        sig = await S.provider.signAndSendTransaction(tx);
        if (!sig || typeof sig !== 'string') throw new Error('Wallet did not return a transaction signature.');
      } else {
        signed = await S.provider.signTransaction(tx);
        sig = await connection.sendRawTransaction(signed.serialize(), { skipPreflight: false, maxRetries: 3 });
      }

      var confirmed = false;
      try {
        var conf = await Promise.race([
          connection.confirmTransaction({ signature: sig, blockhash: latest.blockhash, lastValidBlockHeight: latest.lastValidBlockHeight }, 'confirmed'),
          new Promise(function(_, rej) { setTimeout(function() { rej(new Error('confirm-timeout')); }, 30000); }),
        ]);
        if (conf && conf.value && conf.value.err) throw new Error('Swap tx failed on-chain: ' + JSON.stringify(conf.value.err));
        confirmed = true;
      } catch (cfErr) {
        var deadline = Date.now() + 20000;
        while (Date.now() < deadline) {
          await new Promise(function(r) { setTimeout(r, 2000); });
          try {
            var st = await connection.getSignatureStatus(sig, { searchTransactionHistory: true });
            var cs = st && st.value && st.value.confirmationStatus;
            if (cs === 'confirmed' || cs === 'finalized') { confirmed = true; break; }
            if (st && st.value && st.value.err) throw new Error('Swap tx failed on-chain.');
          } catch (e) {
            if (/failed on-chain/i.test(String(e.message))) throw e;
          }
        }
      }

      S.swapResult = { signature: sig, pending: !confirmed };
      if (confirmed) { S.amount = ''; S.quote = null; setTimeout(function() { refreshBalances(); }, 2000); }
    } catch (e) {
      console.error('[swap]', e);
      S.swapError = friendlyError(e);
    } finally {
      S.swapping = false;
      renderAll();
    }
  }

    els.amount.addEventListener('input', function(e) {
      var v = e.target.value.replace(/[^\d.]/g, '');
      var parts = v.split('.'); if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
      e.target.value = v; S.amount = v; renderButton(); scheduleQuote();
    });
    wrap.querySelector('[data-flip]').addEventListener('click', flip);
    wrap.querySelector('[data-pick="input"]').addEventListener('click', function() { openPicker('input'); });
    wrap.querySelector('[data-pick="output"]').addEventListener('click', function() { openPicker('output'); });
    els.primary.addEventListener('click', function() {
      if (!S.publicKey) openWalletPicker();
      else if (buttonState().enabled) handleSwap();
    });
    renderAll();
  }

  /* RENDERERS */
  function renderRows() {
    var inputToken = tokenBy(S.inputMint), outputToken = tokenBy(S.outputMint);
    var setTokenBtn = function(sel, symEl, token) {
      var btn = root.querySelector(sel); if (!btn) return;
      btn.querySelectorAll('img.sw-token-logo').forEach(function(n) { n.remove(); });
      if (token && token.logoURI) {
        var img = document.createElement('img');
        img.className = 'sw-token-logo'; img.src = token.logoURI; img.alt = '';
        img.onerror = function() { img.style.display = 'none'; };
        btn.insertBefore(img, btn.firstChild);
      }
      symEl.textContent = token && token.symbol || 'Select';
    };
    setTokenBtn('[data-pick="input"]', els.symInput, inputToken);
    setTokenBtn('[data-pick="output"]', els.symOutput, outputToken);

    var renderBal = function(el, mint, editable) {
      el.classList.remove('sw-bal-loading');
      if (!S.publicKey) { el.innerHTML = ''; return; }
      if (S.balancesLoading && !S.balances[mint]) {
        el.classList.add('sw-bal-loading');
        el.textContent = 'Loading balance\u2026';
        return;
      }
      var bal = S.balances[mint];
      var token = tokenBy(mint);
      if (!bal) {
        el.textContent = 'Balance: 0 ' + (token ? token.symbol : '');
        return;
      }
      el.innerHTML = 'Balance: ' + fmtAmount(bal.uiAmount, bal.decimals) + ' ' + (token ? token.symbol : '');
      if (editable && bal.uiAmount > 0) {
        var b = document.createElement('button');
        b.className = 'sw-max-btn'; b.textContent = 'MAX';
        b.addEventListener('click', setMax); el.appendChild(b);
      }
    };
    renderBal(els.balInput, S.inputMint, true);
    renderBal(els.balOutput, S.outputMint, false);
    var oa = outAmountUi();
    els.out.value = oa != null ? fmtAmount(oa, outputToken && outputToken.decimals) : (S.quoting ? '\u2026' : '');
  }

  function renderDetails() {
    var inputToken = tokenBy(S.inputMint), outputToken = tokenBy(S.outputMint);
    var oa = outAmountUi();
    if (!(S.quote && outputToken && inputToken && Number(S.amount) > 0)) {
      els.details.style.display = 'none'; els.details.innerHTML = ''; return;
    }
    var pi = priceImpact();
    var piClass = pi == null ? 'sw-impact-neutral' : pi > 5 ? 'sw-impact-bad' : pi > 1 ? 'sw-impact-warn' : 'sw-impact-good';
    var rate = (oa / Number(S.amount)) || 0;
    els.details.style.display = '';
    els.details.innerHTML = '<div class="sw-detail-row"><span>Rate</span><span class="sw-detail-val">1 '+esc(inputToken.symbol)+' \u2248 '+esc(fmtAmount(rate, outputToken.decimals))+' '+esc(outputToken.symbol)+'</span></div><div class="sw-detail-row"><span>Minimum received</span><span class="sw-detail-val">'+esc(fmtAmount(minReceived(), outputToken.decimals))+' '+esc(outputToken.symbol)+'</span></div><div class="sw-detail-row"><span>Price impact</span><span class="sw-detail-val '+piClass+'">'+(pi != null ? pi.toFixed(2)+'%' : '\u2014')+'</span></div><div class="sw-detail-row"><span>Platform fee</span><span class="sw-detail-val">'+(FEE_BPS/100).toFixed(1)+'% (in '+esc(inputToken.symbol)+')</span></div>';
  }

  function renderBanners() {
    var html = '';
    if (S.quoteError && !S.swapping && !S.swapResult) html += '<div class="sw-banner sw-banner-error">'+esc(S.quoteError)+'</div>';
    if (S.swapError) html += '<div class="sw-banner sw-banner-error">'+esc(S.swapError)+'</div>';
    if (S.swapResult) {
      var kind = S.swapResult.pending ? 'pending' : 'success';
      var msg  = S.swapResult.pending ? 'Submitted but still confirming. ' : 'Swap confirmed. ';
      html += '<div class="sw-banner sw-banner-'+kind+'">'+msg+'<a class="sw-banner-link" href="https://solscan.io/tx/'+esc(S.swapResult.signature)+'" target="_blank" rel="noreferrer">View on Solscan</a></div>';
    }
    els.banners.innerHTML = html;
  }

  function renderButton() {
    var st = buttonState();
    els.primary.textContent = st.label;
    els.primary.classList.toggle('sw-disabled', !st.enabled);
  }

  function renderAll() { renderRows(); renderDetails(); renderBanners(); renderButton(); updateHeader(); }

  /* TOKEN PICKER */
  var pickerEl = null;
  function openPicker(side) {
    closePicker();
    var exclude = side === 'input' ? S.outputMint : S.inputMint;
    var query = '', searchResults = null, searchTimer = null;
    var overlay = document.createElement('div');
    overlay.className = 'sw-modal-overlay';
    overlay.innerHTML = '<div class="sw-modal-card"><div class="sw-modal-head"><div class="sw-modal-head-row"><h3 class="sw-modal-title">Select token</h3><button class="sw-icon-btn" data-close>'+CLOSE_SVG+'</button></div><input class="sw-modal-search" data-search placeholder="Search name, symbol, or paste address" autofocus /></div><div class="sw-modal-list" data-list></div></div>';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closePicker(); });
    overlay.querySelector('[data-close]').addEventListener('click', closePicker);
    var listEl = overlay.querySelector('[data-list]');
    var searchEl = overlay.querySelector('[data-search]');
    var computeList = function() {
      var base = searchResults != null ? searchResults : S.tokens.filter(function(t) {
        if (!query.trim()) return true;
        var q = query.toLowerCase();
        return t.symbol.toLowerCase().includes(q) || (t.name||'').toLowerCase().includes(q) || t.address.toLowerCase().startsWith(q);
      });
      return base.filter(function(t) { return t.address !== exclude; }).sort(function(a, b) {
        var ab = (S.balances[a.address] && S.balances[a.address].uiAmount) || 0;
        var bb = (S.balances[b.address] && S.balances[b.address].uiAmount) || 0;
        if (ab > 0 && bb === 0) return -1; if (bb > 0 && ab === 0) return 1;
        if (ab !== bb) return bb - ab; return a.symbol.localeCompare(b.symbol);
      }).slice(0, 150);
    };
    var renderList = function(searching) {
      if (S.tokensLoading) { listEl.innerHTML = '<div class="sw-modal-msg">Loading tokens\u2026</div>'; return; }
      var list = computeList();
      if (!list.length) { listEl.innerHTML = '<div class="sw-modal-msg">'+(searching ? 'Searching\u2026' : 'No tokens found.')+'</div>'; return; }
      listEl.innerHTML = '';
      list.forEach(function(t) {
        var bal = S.balances[t.address];
        var btn = document.createElement('button');
        btn.className = 'sw-token-row';
        btn.innerHTML = (t.logoURI ? '<img class="sw-token-row-logo" src="'+esc(t.logoURI)+'" alt="" onerror="this.style.visibility=\'hidden\'">' : '<div class="sw-token-row-placeholder"></div>') +
          '<div class="sw-token-row-info"><div class="sw-token-row-sym">'+esc(t.symbol)+'</div><div class="sw-token-row-name">'+esc(t.name)+'</div></div>' +
          (bal && bal.uiAmount > 0 ? '<div class="sw-token-row-bal">'+esc(fmtAmount(bal.uiAmount, bal.decimals))+'</div>' : '');
        btn.addEventListener('click', function() {
          if (side === 'input') S.inputMint = t.address; else S.outputMint = t.address;
          closePicker(); renderAll(); scheduleQuote(); if (S.publicKey) refreshBalances();
        });
        listEl.appendChild(btn);
      });
    };
    searchEl.addEventListener('input', function(e) {
      query = e.target.value;
      if (searchTimer) clearTimeout(searchTimer);
      if (!query.trim()) { searchResults = null; renderList(false); return; }
      renderList(true);
      searchTimer = setTimeout(async function() {
        try {
          var r = await fetch('https://lite-api.jup.ag/tokens/v2/search?query=' + encodeURIComponent(query.trim()));
          var data = await r.json();
          var list = Array.isArray(data) ? data : (data && data.tokens || []);
          searchResults = list.map(function(t) { return {
            address: t.id || t.address || t.mint, symbol: t.symbol, name: t.name,
            decimals: t.decimals, logoURI: t.icon || t.logoURI || null,
          }; }).filter(function(t) { return t.address && t.symbol && t.decimals != null; });
        } catch (e) { console.warn('[swap] search failed', e); }
        renderList(false);
      }, 250);
    });
    document.body.appendChild(overlay); pickerEl = overlay;
    renderList(false); setTimeout(function() { searchEl.focus(); }, 50);
  }
  function closePicker() { if (pickerEl) { pickerEl.remove(); pickerEl = null; } }

  /* HEADER */
  var headerBtn = null;
  function updateHeader() {
    if (!headerBtn) return;
    if (S.publicKey) { var a = S.publicKey.toBase58(); headerBtn.textContent = a.slice(0,4)+'\u2026'+a.slice(-4); }
    else headerBtn.textContent = 'Connect';
  }
  function attachProviderEvents(provider) {
    if (provider.removeAllListeners) { provider.removeAllListeners('disconnect'); provider.removeAllListeners('accountChanged'); }
    if (typeof provider.on !== 'function') return;
    provider.on('disconnect', function() { S.provider = null; S.publicKey = null; S.balances = {}; renderAll(); });
    provider.on('accountChanged', function(pk) {
      if (pk) { S.publicKey = new PublicKey(pk.toString()); refreshBalances(); }
      else { S.provider = null; S.publicKey = null; S.balances = {}; }
      renderAll();
    });
  }

  /* INIT */
  function init() {
    root = document.getElementById('verixia-swap-root');
    if (!root) return;
    var di = root.getAttribute('data-input-mint');
    var dom = root.getAttribute('data-output-mint');
    if (di) S.inputMint = di;
    if (dom) S.outputMint = dom;
    buildDom(); loadTokens();
    headerBtn = document.getElementById('verixia-header-connect');
    if (headerBtn) headerBtn.addEventListener('click', function() {
      if (!S.publicKey) openWalletPicker();
      else openAccountMenu();
    });
    updateHeader();

    // Auto-reconnect Phantom only if user hasn't explicitly disconnected
    var skipAuto = false;
    try { skipAuto = sessionStorage.getItem(DISCONNECT_FLAG) === '1'; } catch(e) {}
    var provider = getPhantom();
    if (provider && !skipAuto) {
      provider.connect({ onlyIfTrusted: true }).then(function(res) {
        S.provider = provider;
        S.walletName = 'Phantom';
        S.publicKey = new PublicKey((res.publicKey || provider.publicKey).toString());
        attachProviderEvents(provider);
        renderAll(); refreshBalances(); scheduleQuote();
      }).catch(function() {});
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
}

/* LOADER */
(function () {
  "use strict";
  function fail() {
    var el = document.getElementById('verixia-swap-root');
    if (el) el.innerHTML = '<div style="padding:20px;font-family:monospace;color:#ffb3c1;line-height:1.5">Could not load the Solana library. Check your connection.</div>';
  }
  function go() { if (window.solanaWeb3) { try { __verixiaApp(); } catch (e) { console.error('[verixia]', e); } } else fail(); }
  function load(src, ok, err) {
    var s = document.createElement('script');
    s.src = src; s.async = false; s.onload = ok; s.onerror = err;
    document.head.appendChild(s);
  }
  if (window.solanaWeb3) { go(); return; }
  load('https://cdn.jsdelivr.net/npm/@solana/web3.js@1/lib/index.iife.min.js', go, function () {
    load('https://unpkg.com/@solana/web3.js@1/lib/index.iife.min.js', go, fail);
  });
})();
</script>
