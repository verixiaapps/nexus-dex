name: Build wallet bundle

# Manual trigger only — go to the Actions tab and click "Run workflow".
# This builds verixia-wc.js (the AppKit wallet bundle for SEO pages) and
# commits it to the repo root. Railway then serves it as a static file.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build wallet bundle
        run: node build-wc.mjs

      - name: Verify output
        run: |
          ls -lh verixia-wc.js
          grep -q "VerixiaWallet" verixia-wc.js && echo "Bundle contains VerixiaWallet ✓"

      - name: Commit bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verixia-wc.js
          if git diff --staged --quiet; then
            echo "Bundle unchanged, nothing to commit"
          else
            git commit -m "build: regenerate wallet bundle [skip ci]"
            git push
          fi
