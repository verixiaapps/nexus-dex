      - name: Check config admin
        run: |
          node - << 'JSEOF'
          const web3 = require("@solana/web3.js");
          (async () => {
            const conn = new web3.Connection("https://api.devnet.solana.com");
            const [cfg] = web3.PublicKey.findProgramAddressSync(
              [Buffer.from("config")],
              new web3.PublicKey(process.env.PROGRAM_ID)
            );
            const info = await conn.getAccountInfo(cfg);
            console.log("Config admin:", new web3.PublicKey(info.data.slice(8, 40)).toBase58());
          })();
          JSEOF
