name: Migrate chainflip to HTTP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Write the new chainflip HTTP block to a temp file
        run: |
          cat > /tmp/cf-new-block.txt << 'CFBLOCK_EOF'
          /* ========================================================================
           * Chainflip — DIRECT HTTP (no SDK)
           * Hits chainflip-swap.chainflip.io directly. Same routes as before so the
           * frontend doesn't change. Adds a hard liquidity gate on top of chainflip's
           * own quote validation.
           * ===================================================================== */
          const CF_BACKEND = 'https://chainflip-swap.chainflip.io';

          const CF_SANITY_BOUNDS = {
            'Solana:SOL':  { min: 0.05,   max: 10000   },
            'Solana:USDC': { min: 5,      max: 1000000 },
            'Solana:USDT': { min: 5,      max: 1000000 },
            'Ethereum:ETH':  { min: 0.01, max: 1000    },
            'Ethereum:USDC': { min: 10,   max: 1000000 },
            'Ethereum:USDT': { min: 10,   max: 1000000 },
            'Ethereum:WBTC': { min: 0.0002, max: 50    },
            'Ethereum:FLIP': { min: 1,    max: 100000  },
            'Arbitrum:ETH':  { min: 0.01, max: 1000    },
            'Arbitrum:USDC': { min: 10,   max: 1000000 },
            'Arbitrum:USDT': { min: 10,   max: 1000000 },
            'Bitcoin:BTC':   { min: 0.0002, max: 50    },
            'Polkadot:DOT':  { min: 1,    max: 1000000 },
            'Assethub:SOL':  { min: 0.05, max: 10000   },
            'Assethub:USDC': { min: 5,    max: 1000000 },
            'Assethub:USDT': { min: 5,    max: 1000000 },
            'Tron:TRX':      { min: 50,   max: 10000000 },
            'Tron:USDT':     { min: 10,   max: 1000000 },
          };

          const CF_DECIMALS = {
            'Solana:SOL':9, 'Solana:USDC':6, 'Solana:USDT':6,
            'Ethereum:ETH':18, 'Ethereum:USDC':6, 'Ethereum:USDT':6, 'Ethereum:WBTC':8, 'Ethereum:FLIP':18,
            'Arbitrum:ETH':18, 'Arbitrum:USDC':6, 'Arbitrum:USDT':6,
            'Bitcoin:BTC':8,
            'Polkadot:DOT':10,
            'Assethub:SOL':9, 'Assethub:USDC':6, 'Assethub:USDT':6,
            'Tron:TRX':6, 'Tron:USDT':6,
          };

          const _cfChainSet = new Set(['Bitcoin','Ethereum','Arbitrum','Polkadot','Solana','Assethub','Tron']);
          const _cfAssetSet = new Set(['BTC','ETH','USDC','USDT','FLIP','WBTC','DOT','SOL','TRX']);

          const _cfMatrix = {
            updatedAt: '2026-06-15',
            chains: [
              { chain:'Ethereum', chainType:'EVM', name:'Ethereum', color:'#627eea',
                assets:[
                  { asset:'ETH',  symbol:'ETH',  name:'Ether',           decimals:18 },
                  { asset:'USDC', symbol:'USDC', name:'USD Coin',        decimals:6  },
                  { asset:'USDT', symbol:'USDT', name:'Tether USD',      decimals:6  },
                  { asset:'WBTC', symbol:'WBTC', name:'Wrapped Bitcoin', decimals:8  },
                  { asset:'FLIP', symbol:'FLIP', name:'Chainflip',       decimals:18 },
                ]},
              { chain:'Arbitrum', chainType:'EVM', name:'Arbitrum', color:'#28a0f0',
                assets:[
                  { asset:'ETH',  symbol:'ETH',  name:'Ether',      decimals:18 },
                  { asset:'USDC', symbol:'USDC', name:'USD Coin',   decimals:6  },
                  { asset:'USDT', symbol:'USDT', name:'Tether USD', decimals:6  },
                ]},
              { chain:'Bitcoin', chainType:'BTC', name:'Bitcoin', color:'#f7931a',
                assets:[{ asset:'BTC', symbol:'BTC', name:'Bitcoin', decimals:8 }]},
              { chain:'Solana', chainType:'SVM', name:'Solana', color:'#14f195',
                assets:[
                  { asset:'SOL',  symbol:'SOL',  name:'Solana',     decimals:9 },
                  { asset:'USDC', symbol:'USDC', name:'USD Coin',   decimals:6 },
                  { asset:'USDT', symbol:'USDT', name:'Tether USD', decimals:6 },
                ]},
              { chain:'Polkadot', chainType:'DOT', name:'Polkadot', color:'#e6007a',
                assets:[{ asset:'DOT', symbol:'DOT', name:'Polkadot', decimals:10 }]},
              { chain:'Assethub', chainType:'DOT', name:'Assethub', color:'#aa5cdb',
                assets:[
                  { asset:'SOL',  symbol:'SOL',  name:'Solana',     decimals:9 },
                  { asset:'USDC', symbol:'USDC', name:'USD Coin',   decimals:6 },
                  { asset:'USDT', symbol:'USDT', name:'Tether USD', decimals:6 },
                ]},
              { chain:'Tron', chainType:'TRX', name:'Tron', color:'#ff060a',
                assets:[
                  { asset:'TRX',  symbol:'TRX',  name:'Tronix',     decimals:6 },
                  { asset:'USDT', symbol:'USDT', name:'Tether USD', decimals:6 },
                ]},
            ],
          };

          function _cfFriendlyErr(msg) {
            const m = String(msg || '').toLowerCase();
            if (m.includes('below') && m.includes('min'))     return 'Amount below Chainflip minimum for this asset';
            if (m.includes('above') && m.includes('max'))     return 'Amount above Chainflip maximum for this asset';
            if (m.includes('liquidity') || m.includes('pool')) return 'Insufficient liquidity right now — try smaller amount';
            if (m.includes('no route') || m.includes('unsupported')) return 'Chainflip does not support this route';
            if (m.includes('timeout') || m.includes('timed out')) return 'Chainflip timed out — please retry';
            return msg && msg.length > 160 ? msg.slice(0,160) + '…' : (msg || 'Chainflip error');
          }

          function _atomicToUi(atomic, decimals) {
            if (!atomic) return 0;
            return Number(BigInt(String(atomic))) / Math.pow(10, decimals);
          }

          app.get('/api/cf/assets', (req, res) => res.json(_cfMatrix));

          app.get('/api/cf/quote', async (req, res) => {
            try {
              const srcChain  = String(req.query.srcChain  || '');
              const srcAsset  = String(req.query.srcAsset  || '');
              const destChain = String(req.query.destChain || '');
              const destAsset = String(req.query.destAsset || '');
              const amount    = String(req.query.amount    || '');

              if (!_cfChainSet.has(srcChain))  return res.status(400).json({ error: 'Invalid srcChain' });
              if (!_cfChainSet.has(destChain)) return res.status(400).json({ error: 'Invalid destChain' });
              if (!_cfAssetSet.has(srcAsset))  return res.status(400).json({ error: 'Invalid srcAsset' });
              if (!_cfAssetSet.has(destAsset)) return res.status(400).json({ error: 'Invalid destAsset' });
              if (srcChain === destChain && srcAsset === destAsset) {
                return res.status(400).json({ error: 'Source and destination must differ' });
              }
              if (!/^\d+$/.test(amount) || BigInt(amount) <= 0n) {
                return res.status(400).json({ error: 'amount (atomic units, positive integer) required' });
              }

              const srcKey = srcChain + ':' + srcAsset;
              const decimals = CF_DECIMALS[srcKey];
              const bounds = CF_SANITY_BOUNDS[srcKey];
              if (decimals != null && bounds) {
                const uiAmount = _atomicToUi(amount, decimals);
                if (uiAmount < bounds.min) return res.status(400).json({ error: 'Amount below minimum (' + bounds.min + ' ' + srcAsset + ')' });
                if (uiAmount > bounds.max) return res.status(400).json({ error: 'Amount above maximum (' + bounds.max + ' ' + srcAsset + ')' });
              }

              const qs = new URLSearchParams({ srcChain, srcAsset, destChain, destAsset, amount, brokerCommissionBps: '0', dcaEnabled: 'false' });
              const upstream = await fetchWithTimeout(CF_BACKEND + '/v2/quote?' + qs.toString(), { headers: { Accept: 'application/json' } }, 12000);
              if (!upstream.ok) {
                const body = await upstream.text().catch(() => '');
                return res.status(upstream.status).json({ error: _cfFriendlyErr(body || 'Quote failed (' + upstream.status + ')') });
              }
              const data = await upstream.json();
              const quotes = Array.isArray(data) ? data : (Array.isArray(data && data.quotes) ? data.quotes : []);
              const regular = quotes.find(q => q.type === 'REGULAR');
              if (!regular) return res.status(502).json({ error: 'No regular quote available for this route' });

              const egress = BigInt(String(regular.egressAmount || '0'));
              if (egress <= 0n) return res.status(502).json({ error: 'Insufficient Chainflip liquidity for this swap' });
              if (regular.lowLiquidityWarning === true || regular.partiallyFillable === true) {
                return res.status(502).json({ error: 'Liquidity too thin for safe execution — try a smaller amount' });
              }

              return res.json({ quote: regular });
            } catch (e) {
              if (e.name === 'AbortError') return res.status(504).json({ error: 'Chainflip quote timed out' });
              logError('cf-quote', e);
              return res.status(500).json({ error: _cfFriendlyErr(e.message) });
            }
          });

          app.post('/api/cf/channel', async (req, res) => {
            try {
              const { quote, destAddress, refundAddress } = req.body || {};
              if (!quote || typeof quote !== 'object')                 return res.status(400).json({ error: 'quote required' });
              if (!destAddress   || typeof destAddress   !== 'string') return res.status(400).json({ error: 'destAddress required' });
              if (!refundAddress || typeof refundAddress !== 'string') return res.status(400).json({ error: 'refundAddress required' });
              if (quote.type !== 'REGULAR')                            return res.status(400).json({ error: 'REGULAR quote required' });

              const body = {
                quote,
                destAddress,
                fillOrKillParams: {
                  refundAddress,
                  retryDurationBlocks: 150,
                  slippageTolerancePercent: Number(quote.recommendedSlippageTolerancePercent != null ? quote.recommendedSlippageTolerancePercent : 1),
                },
              };
              const upstream = await fetchWithTimeout(CF_BACKEND + '/v2/swaps', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
                body: JSON.stringify(body),
              }, 15000);
              if (!upstream.ok) {
                const txt = await upstream.text().catch(() => '');
                return res.status(upstream.status).json({ error: _cfFriendlyErr(txt || 'Channel open failed (' + upstream.status + ')') });
              }
              const channel = await upstream.json();
              return res.json({
                channel: {
                  depositChannelId:    String(channel.depositChannelId || channel.id),
                  depositAddress:      channel.depositAddress,
                  srcChain:            channel.srcChain || quote.srcChain,
                  srcAsset:            channel.srcAsset || quote.srcAsset,
                  destChain:           channel.destChain || quote.destChain,
                  destAsset:           channel.destAsset || quote.destAsset,
                  srcChainExpiryBlock: channel.srcChainExpiryBlock ? String(channel.srcChainExpiryBlock) : null,
                  channelOpeningFee:   channel.channelOpeningFee ? String(channel.channelOpeningFee) : '0',
                  estimatedExpiryTime: channel.estimatedExpiryTime || null,
                  brokerCommissionBps: channel.brokerCommissionBps != null ? channel.brokerCommissionBps : 0,
                },
              });
            } catch (e) {
              if (e.name === 'AbortError') return res.status(504).json({ error: 'Chainflip channel open timed out' });
              logError('cf-channel', e);
              return res.status(500).json({ error: _cfFriendlyErr(e.message) });
            }
          });

          app.get('/api/cf/status', async (req, res) => {
            try {
              const id = String(req.query.id || '');
              if (!id) return res.status(400).json({ error: 'id (depositChannelId) required' });
              const upstream = await fetchWithTimeout(CF_BACKEND + '/v2/swaps/' + encodeURIComponent(id), { headers: { Accept: 'application/json' } }, 8000);
              if (!upstream.ok) return res.status(upstream.status).json({ error: 'Status fetch failed (' + upstream.status + ')' });
              const status = await upstream.json();
              return res.json({ status });
            } catch (e) {
              if (e.name === 'AbortError') return res.status(504).json({ error: 'Chainflip status timed out' });
              logError('cf-status', e);
              return res.status(500).json({ error: _cfFriendlyErr(e.message) });
            }
          });
          CFBLOCK_EOF
          echo "Wrote $(wc -l < /tmp/cf-new-block.txt) lines"

      - name: Patch server.js (replace chainflip section)
        run: |
          node <<'EOF'
          const fs = require('fs');
          let s = fs.readFileSync('server.js', 'utf8');
          const newBlock = fs.readFileSync('/tmp/cf-new-block.txt', 'utf8');

          const startMarker = "const { SwapSDK, Chains, Assets } = require('@chainflip/sdk/swap');";
          const endMarker   = "app.all('/api/*',";

          const startIdx = s.indexOf(startMarker);
          if (startIdx === -1) {
            console.error('Could not find chainflip SDK require — already migrated?');
            process.exit(0);
          }
          const endIdx = s.indexOf(endMarker, startIdx);
          if (endIdx === -1) {
            console.error('Could not find app.all catch-all after chainflip section');
            process.exit(1);
          }

          // Walk back to the opening of the chainflip comment block (look for the line that contains "Chainflip — SOL → native BTC" or the comment ===== bar before it)
          let blockStart = s.lastIndexOf('/* =====', startIdx);
          if (blockStart === -1 || blockStart < startIdx - 5000) blockStart = startIdx;

          // Trim trailing whitespace/newlines before app.all
          let cut = endIdx;
          while (cut > 0 && (s[cut - 1] === '\n' || s[cut - 1] === ' ' || s[cut - 1] === '\t')) cut--;

          const before = s.slice(0, blockStart);
          const after  = s.slice(cut);
          const out    = before + newBlock.trimEnd() + '\n\n' + after.replace(/^\s*/, '');

          fs.writeFileSync('server.js', out);
          console.log('server.js patched: removed', cut - blockStart, 'chars, added', newBlock.length, 'chars');
          EOF

      - name: Clean package.json
        run: |
          node <<'EOF'
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (p.dependencies && p.dependencies['@chainflip/sdk']) {
            delete p.dependencies['@chainflip/sdk'];
            console.log('Removed @chainflip/sdk dependency');
          }
          p.overrides = { uuid: '9.0.1' };
          const fix = (cmd) => cmd ? cmd.replace(/node --experimental-require-module /g, 'node ') : cmd;
          if (p.scripts) {
            for (const k of Object.keys(p.scripts)) p.scripts[k] = fix(p.scripts[k]);
          }
          p.engines = { node: '20.x' };
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('package.json cleaned');
          EOF
          cat package.json

      - name: Reinstall (regenerate lockfile)
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund

      - name: Smoke test server can require
        run: |
          node -e "
          try { require('./server.js'); console.log('server OK'); }
          catch (e) {
            if (/env|ENV|RPC|KEYPAIR|HELIUS|listen|EADDR/i.test(e.message)) {
              console.log('server OK (runtime env):', e.message);
            } else {
              console.error('FAIL:', e.stack);
              process.exit(1);
            }
          }
          "

      - name: Commit to main
        run: |
          if git diff --quiet; then
            echo "::notice::No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js package.json package-lock.json
          git commit -m "migrate: replace @chainflip/sdk with direct HTTP fetches + liquidity gate"
          git push origin HEAD:main
