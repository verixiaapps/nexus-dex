name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: |
          npm install -g npm@10
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Detect stale @noble/hashes subpaths
        run: |
          if grep -rn "@noble/hashes/sha3[\"']" node_modules \
               --include="*.js" --include="*.cjs" --include="*.mjs" \
               | grep -v "/sha3\.js"; then
            echo "::error::A dependency imports the legacy '@noble/hashes/sha3' subpath, which breaks under @noble/hashes v2."
            exit 1
          fi
