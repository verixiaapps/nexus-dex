name: Diagnose @noble/hashes

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: |
          npm install -g npm@10
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: npm ls @noble/hashes
        run: npm ls @noble/hashes --all || true

      - name: npm ls viem @solana/web3.js
        run: npm ls viem @solana/web3.js --all || true

      - name: Every @noble/hashes package.json in tree
        run: |
          find node_modules -path "*/@noble/hashes/package.json" | while read f; do
            echo "=== $f ==="
            node -p "const p=require('./$f'); JSON.stringify({version:p.version, exports:p.exports}, null, 2)"
            echo
          done

      - name: Legacy v1-style sha* imports
        run: |
          grep -rEn "@noble/hashes/(sha256|sha512|sha3|blake[0-9]+|hmac|hkdf|pbkdf2|ripemd160)[\"']" node_modules \
            --include="*.js" --include="*.cjs" --include="*.mjs" \
            | grep -vE "\.(js|cjs|mjs)[\"']" || echo "none"

      - name: New v2-style sha*.js imports
        run: |
          grep -rEn "@noble/hashes/(sha256|sha512|sha3|blake[0-9]+|hmac|hkdf|pbkdf2|ripemd160)\.js" node_modules \
            --include="*.js" --include="*.cjs" --include="*.mjs" || echo "none"

      - name: Build
        run: npm run build:all
