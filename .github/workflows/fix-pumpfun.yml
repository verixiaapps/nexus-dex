name: Fix noble hashes ESM crash

on:
 workflow_dispatch:

permissions:
 contents: write

jobs:
 fix:
   runs-on: ubuntu-latest
   timeout-minutes: 15

   steps:
     - uses: actions/checkout@v4
       with:
         token: ${{ secrets.GITHUB_TOKEN }}

     - uses: actions/setup-node@v4
       with:
         node-version: "20"

     - name: Pin @noble/hashes to v1
       run: |
         node <<'EOF'
         const fs = require('fs');
         const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
         const T = '1.5.0';
         p.overrides = p.overrides || {};
         p.overrides['@noble/hashes'] = T;
         for (const k of ['dependencies','devDependencies']) {
           if (p[k] && p[k]['@noble/hashes']) {
             p[k]['@noble/hashes'] = T;
           }
         }
         fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
         EOF
         cat package.json

     - name: Wipe and reinstall
       run: |
         rm -rf node_modules package-lock.json
         npm install --no-audit --no-fund

     - name: Verify only 1.x noble/hashes present
       shell: bash
       run: |
         npm ls @noble/hashes --all 2>&1 | tee /tmp/tree.txt || true
         if grep -qE "@noble/hashes@(2|3)" /tmp/tree.txt; then
           echo "FAIL: 2.x/3.x present"
           exit 1
         fi
         if grep -qE "@noble/hashes@1\." /tmp/tree.txt; then
           echo "OK"
         else
           echo "FAIL: no 1.x"
           exit 1
         fi

     - name: Smoke 1 - chainflip loads
       run: node -e "require('@chainflip/utils/dist/ss58.cjs'); console.log('OK');"

     - name: Smoke 2 - pump-sdk loads
       run: node -e "require('@pump-fun/pump-sdk'); console.log('OK');"

     - name: Smoke 3 - server.js loads
       run: |
         if [ -f server.js ]; then
           node -e "
           try { require('./server.js'); console.log('OK'); }
           catch (e) {
             if (/env|ENV|RPC|KEYPAIR|HELIUS|listen|EADDR/i.test(e.message)) {
               console.log('OK (runtime env):', e.message);
             } else {
               console.error('FAIL:', e.stack);
               process.exit(1);
             }
           }
           "
         fi

     - name: Commit to main
       run: |
         if git diff --quiet package.json && git diff --quiet package-lock.json; then
           echo "::notice::No changes"
           exit 0
         fi
         git config user.name "github-actions[bot]"
         git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
         git add package.json package-lock.json
         git commit -m "fix: pin @noble/hashes to 1.5.0 for CJS compat"
         git push origin HEAD:main
