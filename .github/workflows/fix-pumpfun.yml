name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: |
          npm install -g npm@10
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Start
        run: node --experimental-require-module server.js &
        env:
          NODE_ENV: production

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== @noble/hashes tree ==="
          npm ls @noble/hashes || true
          echo
          echo "=== viem tree ==="
          npm ls viem || true
          echo
          echo "=== Top-level @noble/hashes version ==="
          node -p "require('@noble/hashes/package.json').version" || true
          echo
          echo "=== Top-level @noble/hashes exports ==="
          node -p "JSON.stringify(require('@noble/hashes/package.json').exports, null, 2)" || true
          echo
          echo "=== Legacy sha3 imports in tree ==="
          grep -rn "@noble/hashes/sha3[\"']" node_modules \
            --include="*.js" --include="*.cjs" --include="*.mjs" \
            | grep -v "/sha3\.js" || echo "none"
          echo
          echo "=== New sha3.js imports in tree ==="
          grep -rn "@noble/hashes/sha3\.js" node_modules \
            --include="*.js" --include="*.cjs" --include="*.mjs" || echo "none"
