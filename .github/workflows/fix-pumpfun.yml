name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: |
          npm install -g npm@10
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund

      - name: Build
        run: npm run build
