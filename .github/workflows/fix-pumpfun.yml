name: Fix pump-sdk crash

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pin Node to 20 via .nvmrc
        run: echo "20" > .nvmrc

      - name: Add anchor override to package.json
        run: |
          node <<'EOF'
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          p.overrides = p.overrides || {};
          p.overrides['@coral-xyz/anchor'] = '0.30.1';
          p.engines = p.engines || {};
          p.engines.node = '20.x';
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('Updated package.json');
          EOF
          cat package.json

      - name: Nuke node_modules and lockfile
        run: |
          rm -rf node_modules package-lock.json yarn.lock pnpm-lock.yaml

      - name: Fresh install
        run: npm install

      - name: Verify only one anchor version
        run: |
          echo "=== anchor versions installed ==="
          npm ls @coral-xyz/anchor || true
          COUNT=$(npm ls @coral-xyz/anchor --all --json 2>/dev/null | grep -o '"version"' | wc -l)
          echo "anchor instances: $COUNT"

      - name: Smoke test - can we require pump-sdk without crashing?
        run: |
          node -e "
          try {
            require('@pump-fun/pump-sdk');
            console.log('✅ @pump-fun/pump-sdk loads cleanly');
          } catch (e) {
            console.error('❌ Still crashing on require:');
            console.error(e.stack);
            process.exit(1);
          }
          "

      - name: Smoke test - load your trade file
        run: |
          node -e "
          try {
            require('./pumpfun-trade.js');
            console.log('✅ pumpfun-trade.js loads cleanly');
          } catch (e) {
            console.error('❌ pumpfun-trade.js crashed:');
            console.error(e.stack);
            process.exit(1);
          }
          " || echo "(non-fatal; may need env vars at require time)"

      - name: Commit fix to a new branch and open PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="fix/pump-sdk-anchor-pin-$(date +%s)"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json .nvmrc
          git commit -m "fix: pin @coral-xyz/anchor to 0.30.1, Node 20

          Resolves 'Assertion failed' crash on startup caused by Anchor
          version mismatch inside @pump-fun/pump-swap-sdk's module-load
          call to getPumpAmmProgram(null)."
          git push origin "$BRANCH"
          gh pr create \
            --title "fix: pump-sdk startup crash (anchor pin + Node 20)" \
            --body "Auto-generated fix. Pins anchor to 0.30.1 via npm overrides, locks Node to 20, regenerates lockfile. Smoke test passed: pump-sdk requires cleanly." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
