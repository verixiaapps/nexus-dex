name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Clean install
        run: npm ci

      - name: Detect stale @noble/hashes subpaths
        run: |
          if grep -rn "@noble/hashes/sha3[\"']" node_modules \
               --include="*.js" --include="*.cjs" --include="*.mjs" \
               | grep -v "/sha3\.js"; then
            echo "::error::A dependency imports the legacy '@noble/hashes/sha3' subpath, which breaks under @noble/hashes v2."
            exit 1
          fi

      - name: Boot smoke test
        run: |
          timeout 15s npm start > boot.log 2>&1 &
          PID=$!
          sleep 10
          if ! kill -0 $PID 2>/dev/null; then
            echo "::error::Server crashed during boot"
            cat boot.log
            exit 1
          fi
          kill $PID || true
          echo "Boot OK"
        env:
          NODE_ENV: production
