name: Fix deps (scoped noble/hashes)

on:
 workflow_dispatch:

permissions:
 contents: write

jobs:
 fix:
   runs-on: ubuntu-latest
   timeout-minutes: 15

   steps:
     - uses: actions/checkout@v4
       with:
         token: ${{ secrets.GITHUB_TOKEN }}

     - uses: actions/setup-node@v4
       with:
         node-version: "20"

     - name: Apply scoped overrides
       run: |
         node <<'EOF'
         const fs = require('fs');
         const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
         if (p.overrides && p.overrides['@noble/hashes']) delete p.overrides['@noble/hashes'];
         p.overrides = p.overrides || {};
         const setNested = (parent, version) => {
           const cur = p.overrides[parent];
           p.overrides[parent] = (cur && typeof cur === 'object' && !Array.isArray(cur))
             ? { ...cur, '@noble/hashes': version }
             : { '@noble/hashes': version };
         };
         setNested('@chainflip/sdk',                '^2.0.0');
         setNested('@chainflip/utils',              '^2.0.0');
         setNested('@solana/web3.js',               '1.5.0');
         setNested('@solana/wallet-adapter-base',   '1.5.0');
         setNested('@solana/wallet-adapter-react',  '1.5.0');
         setNested('@solana/spl-token',             '1.5.0');
         setNested('@pump-fun/pump-sdk',            '1.5.0');
         setNested('@coral-xyz/anchor',             '1.5.0');
         fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
         console.log('Scoped overrides applied');
         EOF
         cat package.json

     - name: Wipe and reinstall
       run: |
         rm -rf node_modules package-lock.json
         npm install --no-audit --no-fund

     - name: Show resolved @noble/hashes tree
       run: npm ls @noble/hashes --all 2>&1 || true

     - name: Commit to main
       run: |
         if git diff --quiet package.json && git diff --quiet package-lock.json; then
           echo "::notice::No changes"
           exit 0
         fi
         git config user.name "github-actions[bot]"
         git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
         git add package.json package-lock.json
         git commit -m "fix: scoped @noble/hashes — chainflip v2, solana stack 1.5.0"
         git push origin HEAD:main
