The bs58 decode is failing. Here’s the fixed workflow:

name: Fix Pyth Feed

on:
  workflow_dispatch:

env:
  PROGRAM_ID: "H4LAd2s7yVboni7oDqf1JtQ3UcqWJBZo5NpAhYisJaVj"
  NEW_PYTH_FEED: "GvDMxPzN1sCj7L26YDK2HnMRXEQmQ2aemov8YBtPS7vR"

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm init -y >/dev/null 2>&1
          npm install --silent \
            @coral-xyz/anchor@0.31.1 \
            @solana/web3.js@1.91.0 \
            rpc-websockets@7.6.1 \
            bs58

      - name: Fix Pyth feed
        env:
          ADMIN_PRIVATE_KEY: ${{ secrets.ADMIN_PRIVATE_KEY }}
        run: |
          node - << 'JSEOF'
          const anchor = require("@coral-xyz/anchor");
          const web3 = require("@solana/web3.js");
          const bs58 = require("bs58");
          const fs = require("fs");

          const PROGRAM_ID = new web3.PublicKey(process.env.PROGRAM_ID);
          const NEW_PYTH_FEED = new web3.PublicKey(process.env.NEW_PYTH_FEED);
          const IDL = JSON.parse(fs.readFileSync("flipsy/target/idl/flipsy.json"));

          (async () => {
            const conn = new web3.Connection("https://api.devnet.solana.com", "confirmed");
            const secretKey = process.env.ADMIN_PRIVATE_KEY.trim();
            let kp;
            try {
              kp = web3.Keypair.fromSecretKey(Uint8Array.from(JSON.parse(secretKey)));
            } catch {
              kp = web3.Keypair.fromSecretKey(bs58.decode(secretKey));
            }
            console.log("Admin wallet:", kp.publicKey.toBase58());
            const provider = new anchor.AnchorProvider(conn, new anchor.Wallet(kp), { commitment: "confirmed" });
            anchor.setProvider(provider);
            const program = new anchor.Program(IDL, provider);
            const [cfg] = web3.PublicKey.findProgramAddressSync([Buffer.from("config")], PROGRAM_ID);
            const sig = await program.methods.setPythFeed(NEW_PYTH_FEED)
              .accounts({ config: cfg, admin: kp.publicKey })
              .rpc();
            console.log("✅ Pyth feed updated:", sig);
          })().catch(e => { console.error(e.message); process.exit(1); });
          JSEOF
