name: Flipsy Reset 3m7

on:
 workflow_dispatch:

env:
 SEED: "flipsy-fresh-1"
 PROGRAM_ID: "H4LAd2s7yVboni7oDqf1JtQ3UcqWJBZo5NpAhYisJaVj"
 USDC_MINT: "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
 NEW_PYTH_FEED: "GvDMxPzN1sCj7L26YDK2HnMRXEQmQ2aemov8YBtPS7vR"

jobs:
 reset:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - uses: actions/setup-node@v4
       with:
         node-version: 20

     - name: Install deps
       run: |
         pip3 install cryptography
         npm init -y >/dev/null 2>&1
         npm install --silent \
           @coral-xyz/anchor@0.31.1 \
           @solana/web3.js@1.91.0 \
           @solana/spl-token@0.4.6 \
           rpc-websockets@7.6.1 \
           bs58@4.0.1

     - name: Derive crank keypair
       run: |
         mkdir -p ~/.config/solana
         python3 << 'PYEOF'
         import hashlib, json, os
         from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
         from cryptography.hazmat.primitives.serialization import PublicFormat, Encoding
         seed_bytes = hashlib.sha256(os.environ["SEED"].encode()).digest()
         priv = Ed25519PrivateKey.from_private_bytes(seed_bytes)
         pub = priv.public_key().public_bytes(Encoding.Raw, PublicFormat.Raw)
         with open(os.path.expanduser("~/.config/solana/id.json"), "w") as f:
             json.dump(list(seed_bytes) + list(pub), f)
         PYEOF

     - name: Close and reinitialize config
       env:
         ADMIN_KEYPAIR: ${{ secrets.ADMIN_KEYPAIR }}
       run: |
         node - << 'JSEOF'
         const anchor = require("@coral-xyz/anchor");
         const web3 = require("@solana/web3.js");
         const bs58 = require("bs58");
         const fs = require("fs");
         const os = require("os");
         const path = require("path");

         const PROGRAM_ID = new web3.PublicKey(process.env.PROGRAM_ID);
         const USDC_MINT = new web3.PublicKey(process.env.USDC_MINT);
         const PYTH_FEED = new web3.PublicKey(process.env.NEW_PYTH_FEED);
         const IDL = JSON.parse(fs.readFileSync("flipsy/target/idl/flipsy.json"));

         (async () => {
           const conn = new web3.Connection("https://api.devnet.solana.com", "confirmed");

           const secretKey = bs58.decode(process.env.ADMIN_KEYPAIR.trim());
           const adminKp = web3.Keypair.fromSeed(secretKey);
           console.log("Admin wallet:", adminKp.publicKey.toBase58());

           const crankKp = web3.Keypair.fromSecretKey(
             Uint8Array.from(JSON.parse(fs.readFileSync(path.join(os.homedir(), ".config/solana/id.json"))))
           );
           console.log("Crank wallet:", crankKp.publicKey.toBase58());

           const adminProvider = new anchor.AnchorProvider(conn, new anchor.Wallet(adminKp), { commitment: "confirmed" });
           anchor.setProvider(adminProvider);
           const adminProgram = new anchor.Program(IDL, adminProvider);
           const [cfg] = web3.PublicKey.findProgramAddressSync([Buffer.from("config")], PROGRAM_ID);

           try {
             const config = await adminProgram.account.config.fetch(cfg);
             console.log("Existing admin:", config.admin.toBase58());
             console.log("Closing config...");
             const closeSig = await adminProgram.methods.closeConfig()
               .accounts({ config: cfg, admin: adminKp.publicKey })
               .rpc();
             console.log("Closed:", closeSig);
           } catch (e) {
             console.log("No config to close:", e.message);
           }

           console.log("Initializing with crank as admin...");
           const crankProvider = new anchor.AnchorProvider(conn, new anchor.Wallet(crankKp), { commitment: "confirmed" });
           anchor.setProvider(crankProvider);
           const crankProgram = new anchor.Program(IDL, crankProvider);
           const initSig = await crankProgram.methods
             .initialize(
               new anchor.BN(300),
               new anchor.BN(1_000_000),
               new anchor.BN(100_000_000),
               200,
               500
             )
             .accounts({
               config: cfg,
               usdcMint: USDC_MINT,
               pythFeed: PYTH_FEED,
               treasury: crankKp.publicKey,
               admin: crankKp.publicKey,
               systemProgram: web3.SystemProgram.programId,
             })
             .rpc();
           console.log("Initialized:", initSig);
         })().catch(e => { console.error("Failed:", e.message); process.exit(1); });
         JSEOF
