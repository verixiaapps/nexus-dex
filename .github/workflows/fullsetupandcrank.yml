name: Full Setup and Run Crank 6 3 26

on:
  workflow_dispatch:
    inputs:
      crank_keypair:
        description: Phantom base58 private key
        required: true

permissions:
  contents: read

jobs:
  setup-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Run crank (smoke test)
        env:
          CRANK_KEYPAIR: ${{ github.event.inputs.crank_keypair }}
          RPC_URL: https://solana-devnet.drpc.org
        run: |
          timeout 480 npx tsx crank/crank.ts || code=$?
          if [ "$code" = "124" ]; then
            echo "Crank ran the full 8 minutes — treating timeout as success"
            exit 0
          fi
          exit ${code:-0}
