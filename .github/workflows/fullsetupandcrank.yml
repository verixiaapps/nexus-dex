# ============================================================================
# fullsetupandcrank.yml — REVIEW NOTES (read me) — no logic changed
# ----------------------------------------------------------------------------
# - SECURITY: this passes the cranker key as a PLAINTEXT workflow_dispatch input,
#   visible in the Actions UI / run logs / history. Prefer an encrypted repo
#   secret (secrets.CRANK_KEYPAIR) and trigger without exposing the key. Always
#   use a DEDICATED, low-funded cranker wallet — never your main wallet.
# - This is an 8-minute SMOKE TEST (timeout 480s; exit 124 or 0 counts as pass),
#   not continuous cranking. For that, run crank.ts as a long-lived service
#   (e.g. Railway) with FLIPSY_PROGRAM_ID and CRANK_KEYPAIR set as variables.
# - Requires the program deployed + IDL published on-chain (anchor idl init) and
#   the config PDA initialized, or the crank idles / errors on boot.
# ============================================================================
name: Crank Smoke Test

on:
  workflow_dispatch:
    inputs:
      crank_keypair:
        description: Phantom base58 private key
        required: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: Run crank (smoke test, 8 min)
        env:
          CRANK_KEYPAIR: ${{ github.event.inputs.crank_keypair }}
          RPC_URL: https://api.devnet.solana.com
        run: |
          set +e
          timeout 480 npx tsx crank/crank.ts
          code=$?
          if [ "$code" = "124" ] || [ "$code" = "0" ]; then
            echo "Smoke test passed (exit=$code)"
            exit 0
          fi
          exit "$code"
