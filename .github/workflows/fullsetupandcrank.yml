name: Crank Smoke Test

on:
  workflow_dispatch:
    inputs:
      crank_keypair:
        description: Phantom base58 private key
        required: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: Run crank (smoke test, 8 min)
        env:
          CRANK_KEYPAIR: ${{ github.event.inputs.crank_keypair }}
          RPC_URL: https://api.devnet.solana.com
        run: |
          set +e
          timeout 480 npx tsx crank/crank.ts
          code=$?
          if [ "$code" = "124" ] || [ "$code" = "0" ]; then
            echo "Smoke test passed (exit=$code)"
            exit 0
          fi
          exit "$code"
