# ============================================================================
# fullsetupandcrank.yml — Crank smoke test (devnet)
# ----------------------------------------------------------------------------
# WHAT THIS IS: an ~8-minute smoke test that boots crank.ts against devnet to
# confirm it connects, finds the IDL/config, and cranks a round or two. It is
# NOT continuous cranking — for that, run crank.ts as a long-lived service
# (e.g. Railway) with FLIPSY_PROGRAM_ID and CRANK_KEYPAIR set as variables.
#
# SECURITY (important):
#   - The cranker key is read from an ENCRYPTED REPO SECRET (secrets.CRANK_KEYPAIR),
#     never a workflow input. GitHub masks secrets in logs. Do NOT switch this to a
#     workflow_dispatch input — those are shown in the UI and are NOT masked.
#   - Use a DEDICATED, low-funded devnet cranker wallet. Never your main wallet.
#
# PROGRAM ID: FLIPSY_PROGRAM_ID falls back to the System Program placeholder
#   (11111111111111111111111111111111) when the secret is unset, so the crank
#   boots on a VALID key and simply idles/warns instead of crashing on
#   `new PublicKey(undefined)`. Set secrets.FLIPSY_PROGRAM_ID once deployed.
#
# PREREQS: program deployed + IDL published (anchor idl init) + config PDA
#   initialized. Otherwise the crank boots and idles ("No IDL on chain").
#
# SETUP: repo Settings -> Secrets and variables -> Actions -> New repository secret
#   CRANK_KEYPAIR      = base58 (or JSON array) secret key of the devnet cranker
#   FLIPSY_PROGRAM_ID  = deployed program ID (optional; placeholder used if unset)
# ============================================================================
name: Crank Smoke Test

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: crank-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Guard — require CRANK_KEYPAIR secret
        env:
          CRANK_KEYPAIR: ${{ secrets.CRANK_KEYPAIR }}
        run: |
          if [ -z "$CRANK_KEYPAIR" ]; then
            echo "::error::CRANK_KEYPAIR secret is not set. Add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "CRANK_KEYPAIR present (value hidden)."

      - name: Install deps
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Run crank (smoke test, ~8 min)
        env:
          # Masked by GitHub Actions in all logs.
          CRANK_KEYPAIR: ${{ secrets.CRANK_KEYPAIR }}
          # Falls back to the System Program placeholder so the crank boots on a
          # VALID pubkey and idles instead of crashing when the real ID isn't set.
          FLIPSY_PROGRAM_ID: ${{ secrets.FLIPSY_PROGRAM_ID || '11111111111111111111111111111111' }}
        run: |
          set +e
          if [ "$FLIPSY_PROGRAM_ID" = "11111111111111111111111111111111" ]; then
            echo "::warning::FLIPSY_PROGRAM_ID not set — using placeholder. Crank will idle (no IDL/config). Set secrets.FLIPSY_PROGRAM_ID after deploy."
          fi
          timeout 480 npx --yes tsx crank/crank.ts
          code=$?
          # 124 = timed out (crank was happily looping) ; 0 = clean exit. Both pass.
          if [ "$code" = "124" ] || [ "$code" = "0" ]; then
            echo "Smoke test passed (exit=$code)"
            exit 0
          fi
          echo "::error::Crank exited with code $code"
          exit "$code"
