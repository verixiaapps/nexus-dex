name: Flipsy DEVNET v13

on:
  workflow_dispatch:
    inputs:
      seed:
        description: 'Short passphrase (any text — same passphrase = same wallets every run)'
        required: true
        default: 'flipsy-deploy'

env:
  TREASURY_OWNER: "Dd6bKf6SXYQfs24M8evyTXo1MdYrZgbxhk6wWby8NRFV"
  USDC_MINT:      "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
  PYTH_FEED:      "J83w4HKfqxwcq3BEMMkPFSppX3gqekLyLJBexebFVkix"

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: solanafoundation/anchor:v0.31.1
      options: --user root
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          rustup default stable 2>/dev/null || rustup default 1.79.0 2>/dev/null || true
          rustc --version || true
          solana --version || true
          anchor --version || true

      - name: Install Python cryptography
        run: |
          python3 -c "from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey" 2>/dev/null && echo "already installed" && exit 0
          pip install --quiet --break-system-packages cryptography 2>/dev/null \
            || pip3 install --quiet --break-system-packages cryptography 2>/dev/null \
            || (apt-get update -qq && apt-get install -y -qq python3-cryptography)
          python3 -c "from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey; print('cryptography OK')"

      - name: Derive deployer + helper keypairs from seed (pure Python)
        env:
          SEED: ${{ inputs.seed }}
        run: |
          mkdir -p /root/.config/solana
          python3 << 'PYEOF'
          import hashlib, json, os
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          from cryptography.hazmat.primitives.serialization import PublicFormat, Encoding

          ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz'
          def b58encode(b):
              n = int.from_bytes(b, 'big'); s = ''
              while n > 0:
                  n, r = divmod(n, 58); s = ALPHABET[r] + s
              for byte in b:
                  if byte == 0: s = '1' + s
                  else: break
              return s

          base = os.environ["SEED"]
          for suffix, label in [("", "main"), ("-h1", "h1"), ("-h2", "h2"), ("-h3", "h3")]:
              seed_bytes = hashlib.sha256((base + suffix).encode()).digest()
              priv = Ed25519PrivateKey.from_private_bytes(seed_bytes)
              pub = priv.public_key().public_bytes(Encoding.Raw, PublicFormat.Raw)
              # Solana id.json format: 64-byte array = 32-byte seed + 32-byte pubkey
              secret_key = list(seed_bytes) + list(pub)
              path = f"/root/.config/solana/{label}.json"
              with open(path, "w") as f:
                  json.dump(secret_key, f)
              print(f"{label:6s}: {b58encode(pub)}")
          PYEOF
          cp /root/.config/solana/main.json /root/.config/solana/id.json
          chmod 600 /root/.config/solana/*.json
          solana config set --url devnet --keypair /root/.config/solana/id.json

      - name: Print wallet addresses + balances
        run: |
          echo "==================================================="
          for w in main h1 h2 h3; do
            ADDR=$(solana address --keypair /root/.config/solana/$w.json)
            BAL=$(solana balance --keypair /root/.config/solana/$w.json 2>/dev/null | awk '{print $1}')
            echo "  $w: $ADDR  ($BAL SOL)"
          done
          echo "==================================================="

      - name: Pool airdrops from helpers into main deployer
        run: |
          MAIN=$(solana address --keypair /root/.config/solana/main.json)
          NEED=1.7

          balance_of() { solana balance --keypair /root/.config/solana/$1.json 2>/dev/null | awk '{print $1}'; }
          main_bal()   { solana balance 2>/dev/null | awk '{print $1}'; }
          enough()     { awk "BEGIN{exit !($(main_bal) >= $NEED)}"; }

          echo "--- Phase 1: airdrop directly to main ---"
          for i in 1 2 3 4 5 6 7 8; do
            enough && break
            echo "  attempt $i on main..."
            solana airdrop 2 --keypair /root/.config/solana/main.json 2>&1 | tail -2
            sleep 15
          done
          echo "  main after phase 1: $(main_bal) SOL"

          for round in 1 2 3; do
            enough && break
            echo "--- Phase 2 round $round: airdrop helpers, sweep to main ---"
            for h in h1 h2 h3; do
              enough && break
              HADDR=$(solana address --keypair /root/.config/solana/$h.json)
              echo "  airdropping $h ($HADDR)..."
              for k in 1 2 3; do
                solana airdrop 2 --keypair /root/.config/solana/$h.json 2>&1 | tail -2
                HBAL=$(balance_of $h)
                awk "BEGIN{exit !($HBAL >= 0.5)}" && break
                sleep 10
              done
              HBAL=$(balance_of $h)
              echo "  $h balance: $HBAL SOL"
              if awk "BEGIN{exit !($HBAL > 0.01)}"; then
                AMT=$(awk "BEGIN{printf \"%.6f\", $HBAL - 0.001}")
                echo "  transferring $AMT SOL from $h to main..."
                solana transfer "$MAIN" "$AMT" \
                  --keypair /root/.config/solana/$h.json \
                  --allow-unfunded-recipient \
                  --fee-payer /root/.config/solana/$h.json 2>&1 | tail -2 || true
              fi
            done
            echo "  main after round $round: $(main_bal) SOL"
            sleep 20
          done

          BAL=$(main_bal)
          echo "==================================================="
          echo "  FINAL main balance: $BAL SOL  (need $NEED)"
          echo "==================================================="
          if ! enough; then
            cat <<EOF
          ::error::Could not fund deployer to $NEED SOL via airdrops.
          Fund any of these addresses (devnet) and re-run with the same passphrase:
            MAIN: $MAIN
            H1:   $(solana address --keypair /root/.config/solana/h1.json)
            H2:   $(solana address --keypair /root/.config/solana/h2.json)
            H3:   $(solana address --keypair /root/.config/solana/h3.json)
          Faucets to try: https://jumpbit.io/en/solana/devnet-faucet
                          https://www.devnetfaucet.org
                          https://faucet.quicknode.com/solana/devnet
                          https://faucet.solana.com
          EOF
            exit 1
          fi

      - name: Patch lib.rs (remove pyth-sdk-solana)
        working-directory: flipsy
        run: |
          python3 << 'PYEOF'
          import re
          path = "programs/flipsy/src/lib.rs"
          with open(path) as f: src = f.read()
          src = re.sub(r'^use pyth_sdk_solana[^\n]*\n', '', src, flags=re.MULTILINE)
          new_fn = '''fn read_pyth_price(feed_info: &AccountInfo, current_ts: i64) -> Result<i64> {
              let data = feed_info.try_borrow_data().map_err(|_| FlipsyError::PythError)?;
              if data.len() < 240 { return err!(FlipsyError::PythError); }
              let magic = u32::from_le_bytes(data[0..4].try_into().unwrap());
              if magic != 0xa1b2c3d4 { return err!(FlipsyError::PythError); }
              let atype = u32::from_le_bytes(data[8..12].try_into().unwrap());
              if atype != 3 { return err!(FlipsyError::PythError); }
              let expo = i32::from_le_bytes(data[20..24].try_into().unwrap());
              let timestamp = i64::from_le_bytes(data[96..104].try_into().unwrap());
              if current_ts.saturating_sub(timestamp) > 60 { return err!(FlipsyError::PythStale); }
              let status = u32::from_le_bytes(data[224..228].try_into().unwrap());
              if status != 1 { return err!(FlipsyError::PythStale); }
              let raw = i64::from_le_bytes(data[208..216].try_into().unwrap());
              let normalized = if expo >= -8 {
                  raw.checked_mul(10_i64.pow((expo + 8) as u32)).ok_or(FlipsyError::PythOverflow)?
              } else {
                  raw.checked_div(10_i64.pow((-expo - 8) as u32)).ok_or(FlipsyError::PythOverflow)?
              };
              Ok(normalized)
          }'''
          pat = re.compile(r'fn read_pyth_price\([^)]*\) -> Result<i64> \{.*?\n\}', re.DOTALL)
          if pat.search(src): src = pat.sub(new_fn, src, count=1)
          with open(path, 'w') as f: f.write(src)
          PYEOF

      - name: Patch Cargo.toml + Anchor.toml
        working-directory: flipsy
        run: |
          sed -i '/^pyth-sdk-solana/d' programs/flipsy/Cargo.toml
          sed -i 's/anchor-lang = "=*0\.30\.[0-9]*"/anchor-lang = "0.31.1"/g' programs/flipsy/Cargo.toml
          sed -i 's/anchor-spl = "=*0\.30\.[0-9]*"/anchor-spl = "0.31.1"/g' programs/flipsy/Cargo.toml
          sed -i 's/anchor_version = "0\.30\.[0-9]*"/anchor_version = "0.31.1"/g' Anchor.toml

      - name: Build
        working-directory: flipsy
        run: |
          rm -rf target Cargo.lock
          anchor build

      - name: Read program ID
        id: pid
        working-directory: flipsy
        run: |
          PROGRAM_ID=$(anchor keys list | awk '{print $2}' | head -1)
          echo "id=$PROGRAM_ID" >> $GITHUB_OUTPUT
          echo "Program ID: $PROGRAM_ID"

      - name: Write program ID into source
        working-directory: flipsy
        env:
          PROGRAM_ID: ${{ steps.pid.outputs.id }}
        run: |
          sed -i "s|declare_id!(\"[^\"]*\");|declare_id!(\"$PROGRAM_ID\");|" programs/flipsy/src/lib.rs
          sed -i "s|^flipsy = \"[^\"]*\"$|flipsy = \"$PROGRAM_ID\"|g" Anchor.toml

      - name: Rebuild + deploy
        working-directory: flipsy
        run: |
          anchor build
          anchor deploy --provider.cluster devnet

      - name: Install JS deps for init (pinned to CJS-compatible versions)
        run: |
          mkdir -p /tmp/init && cd /tmp/init
          npm init -y >/dev/null 2>&1
          npm install --no-progress --silent \
            @coral-xyz/anchor@0.31.1 \
            @solana/web3.js@1.91.0 \
            @solana/spl-token@0.4.6 \
            2>&1 | tail -3
          # Copy modules where init.js expects them
          cp -r node_modules $GITHUB_WORKSPACE/node_modules

      - name: Treasury ATA + initialize + transfer admin
        env:
          PROGRAM_ID: ${{ steps.pid.outputs.id }}
        run: |
          cat > init.js << 'JSEOF'
          const anchor = require("@coral-xyz/anchor");
          const web3 = require("@solana/web3.js");
          const spl  = require("@solana/spl-token");
          const fs   = require("fs");
          const PROGRAM_ID     = new web3.PublicKey(process.env.PROGRAM_ID);
          const USDC_MINT      = new web3.PublicKey(process.env.USDC_MINT);
          const PYTH_FEED      = new web3.PublicKey(process.env.PYTH_FEED);
          const TREASURY_OWNER = new web3.PublicKey(process.env.TREASURY_OWNER);
          const IDL = JSON.parse(fs.readFileSync("flipsy/target/idl/flipsy.json"));
          (async () => {
            const conn = new web3.Connection("https://api.devnet.solana.com", "confirmed");
            const kp = web3.Keypair.fromSecretKey(Uint8Array.from(JSON.parse(fs.readFileSync("/root/.config/solana/id.json"))));
            const provider = new anchor.AnchorProvider(conn, new anchor.Wallet(kp), { commitment: "confirmed" });
            anchor.setProvider(provider);
            let program;
            try { program = new anchor.Program(IDL, provider); }
            catch { program = new anchor.Program(IDL, PROGRAM_ID, provider); }
            const ata = await spl.getAssociatedTokenAddress(USDC_MINT, TREASURY_OWNER);
            if (!(await conn.getAccountInfo(ata))) {
              const sig = await web3.sendAndConfirmTransaction(conn,
                new web3.Transaction().add(spl.createAssociatedTokenAccountInstruction(kp.publicKey, ata, TREASURY_OWNER, USDC_MINT)),
                [kp]);
              console.log("ATA:", sig);
            }
            const [cfg] = web3.PublicKey.findProgramAddressSync([Buffer.from("config")], PROGRAM_ID);
            let c; try { c = await program.account.config.fetch(cfg); } catch {}
            if (!c) {
              const sig = await program.methods
                .initialize(new anchor.BN(300), new anchor.BN(100000), new anchor.BN(5000000), 2000, 500)
                .accounts({ config: cfg, usdcMint: USDC_MINT, pythFeed: PYTH_FEED, treasury: ata,
                            admin: kp.publicKey, systemProgram: web3.SystemProgram.programId }).rpc();
              console.log("init:", sig);
              c = await program.account.config.fetch(cfg);
            }
            if (!c.admin.equals(TREASURY_OWNER) && c.admin.equals(kp.publicKey)) {
              const sig = await program.methods.setAdmin(TREASURY_OWNER)
                .accounts({ config: cfg, admin: kp.publicKey }).rpc();
              console.log("setAdmin:", sig);
            }
          })().catch(e => { console.error("INIT FAILED:", e); process.exit(1); });
          JSEOF
          node init.js

      - name: Transfer upgrade authority
        env:
          PROGRAM_ID: ${{ steps.pid.outputs.id }}
        run: |
          solana program set-upgrade-authority "$PROGRAM_ID" \
            --new-upgrade-authority "$TREASURY_OWNER" \
            --skip-new-upgrade-authority-signer-check

      - name: Final summary
        env:
          PROGRAM_ID: ${{ steps.pid.outputs.id }}
        run: |
          echo "==============================================="
          echo " DEPLOYED. Program ID: $PROGRAM_ID"
          echo " Admin & upgrade auth: $TREASURY_OWNER (you)"
          echo " https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"
          echo "==============================================="
