name: Flipsy Init v4

on:
  workflow_dispatch:
    inputs:
      seed:
        description: 'Short passphrase (same passphrase = same wallets every run)'
        required: true
        default: 'flipsy-fresh-1'

env:
  TREASURY_OWNER: "Dd6bKf6SXYQfs24M8evyTXo1MdYrZgbxhk6wWby8NRFV"
  USDC_MINT:      "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
  PYTH_FEED:      "J83w4HKfqxwcq3BEMMkPFSppX3gqekLyLJBexebFVkix"
  PROGRAM_ID:     "H4LAd2s7yVboni7oDqf1JtQ3UcqWJBZo5NpAhYisJaVj"

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS deps
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-progress --silent \
            @coral-xyz/anchor@0.31.1 \
            @solana/web3.js@1.91.0 \
            @solana/spl-token@0.4.6 \
            rpc-websockets@7.6.1

      - name: Install Python cryptography
        run: pip3 install cryptography

      - name: Derive deployer keypair from seed
        env:
          SEED: ${{ inputs.seed }}
        run: |
          mkdir -p ~/.config/solana
          python3 << 'PYEOF'
          import hashlib, json, os
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          from cryptography.hazmat.primitives.serialization import PublicFormat, Encoding
          ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz'
          def b58encode(b):
              n = int.from_bytes(b, 'big'); s = ''
              while n > 0:
                  n, r = divmod(n, 58); s = ALPHABET[r] + s
              for byte in b:
                  if byte == 0: s = '1' + s
                  else: break
              return s
          seed_bytes = hashlib.sha256(os.environ["SEED"].encode()).digest()
          priv = Ed25519PrivateKey.from_private_bytes(seed_bytes)
          pub = priv.public_key().public_bytes(Encoding.Raw, PublicFormat.Raw)
          secret_key = list(seed_bytes) + list(pub)
          path = os.path.expanduser("~/.config/solana/id.json")
          with open(path, "w") as f:
              json.dump(secret_key, f)
          print(f"Deployer: {b58encode(pub)}")
          PYEOF

      - name: Run init
        run: |
          node - << 'JSEOF'
          const anchor = require("@coral-xyz/anchor");
          const web3   = require("@solana/web3.js");
          const spl    = require("@solana/spl-token");
          const fs     = require("fs");
          const os     = require("os");
          const path   = require("path");

          const PROGRAM_ID     = new web3.PublicKey(process.env.PROGRAM_ID);
          const USDC_MINT      = new web3.PublicKey(process.env.USDC_MINT);
          const PYTH_FEED      = new web3.PublicKey(process.env.PYTH_FEED);
          const TREASURY_OWNER = new web3.PublicKey(process.env.TREASURY_OWNER);
          const IDL = JSON.parse(fs.readFileSync("flipsy/target/idl/flipsy.json"));

          (async () => {
            const conn = new web3.Connection("https://api.devnet.solana.com", "confirmed");
            const keypairPath = path.join(os.homedir(), ".config/solana/id.json");
            const kp = web3.Keypair.fromSecretKey(
              Uint8Array.from(JSON.parse(fs.readFileSync(keypairPath)))
            );
            const provider = new anchor.AnchorProvider(conn, new anchor.Wallet(kp), { commitment: "confirmed" });
            anchor.setProvider(provider);

            let program;
            try { program = new anchor.Program(IDL, provider); }
            catch { program = new anchor.Program(IDL, PROGRAM_ID, provider); }

            const ata = await spl.getAssociatedTokenAddress(USDC_MINT, TREASURY_OWNER);
            if (!(await conn.getAccountInfo(ata))) {
              const sig = await web3.sendAndConfirmTransaction(conn,
                new web3.Transaction().add(
                  spl.createAssociatedTokenAccountInstruction(kp.publicKey, ata, TREASURY_OWNER, USDC_MINT)
                ), [kp]
              );
              console.log("Treasury ATA created:", sig);
            } else {
              console.log("Treasury ATA already exists");
            }

            const [cfg] = web3.PublicKey.findProgramAddressSync([Buffer.from("config")], PROGRAM_ID);
            let c;
            try { c = await program.account.config.fetch(cfg); } catch {}
            if (!c) {
              const sig = await program.methods
                .initialize(
                  new anchor.BN(300),
                  new anchor.BN(100000),
                  new anchor.BN(5000000),
                  2000,
                  500
                )
                .accounts({
                  config:        cfg,
                  usdcMint:      USDC_MINT,
                  pythFeed:      PYTH_FEED,
                  treasury:      ata,
                  admin:         kp.publicKey,
                  systemProgram: web3.SystemProgram.programId,
                })
                .rpc();
              console.log("Initialized:", sig);
              c = await program.account.config.fetch(cfg);
            } else {
              console.log("Already initialized");
            }

            if (!c.admin.equals(TREASURY_OWNER) && c.admin.equals(kp.publicKey)) {
              const sig = await program.methods.setAdmin(TREASURY_OWNER)
                .accounts({ config: cfg, admin: kp.publicKey })
                .rpc();
              console.log("Admin transferred:", sig);
            } else {
              console.log("Admin already correct");
            }

            console.log("Done.");
            console.log("Config PDA:", cfg.toString());
            console.log("Treasury ATA:", ata.toString());
          })().catch(e => { console.error("INIT FAILED:", e); process.exit(1); });
          JSEOF

      - name: Summary
        run: |
          echo "======================================================="
          echo "  Program ID : $PROGRAM_ID"
          echo "  Admin      : $TREASURY_OWNER"
          echo "  Explorer   : https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"
          echo "======================================================="
