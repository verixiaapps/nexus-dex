name: Get Program ID

on:
 workflow_dispatch:

jobs:
 get-program-id:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - uses: actions/setup-node@v4
       with:
         node-version: 20

     - name: Install deps
       run: |
         npm init -y >/dev/null 2>&1
         npm install --silent @solana/web3.js@1.91.0

     - name: Get program ID
       run: |
         node - << 'JSEOF'
         const web3 = require("@solana/web3.js");
         const fs = require("fs");

         const keypairFile = "flipsy/target/deploy/flipsy-keypair.json";
         if (!fs.existsSync(keypairFile)) {
           console.log("Keypair file not found at:", keypairFile);
           process.exit(1);
         }
         const kp = web3.Keypair.fromSecretKey(
           Uint8Array.from(JSON.parse(fs.readFileSync(keypairFile)))
         );
         console.log("Program ID:", kp.publicKey.toBase58());
         JSEOF
