name: Fix RPC URL
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix Ankr references in template
        run: |
          # Fix RPC URL
          sed -i 's|https://rpc.ankr.com/solana|https://solana-rpc.publicnode.com|g' ./template/defi-template.html

          # Fix comment block
          sed -i "s|Now using Ankr's free public Solana|Uses PublicNode's free Solana|g" ./template/defi-template.html
          sed -i 's|fallback pool (Ankr → publicnode → mainnet-beta)|mainnet-beta as fallback.|g' ./template/defi-template.html

          # Remove duplicate publicnode line
          sed -i '/solana-rpc.publicnode.com/{n;/solana-rpc.publicnode.com/d;}' ./template/defi-template.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: remove all Ankr references from template, use PublicNode"
          git push
