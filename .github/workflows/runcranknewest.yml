name: Run Crank

on:
  workflow_dispatch:
    inputs:
      crank_keypair:
        description: 'Phantom base58 private key'
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Run crank
        env:
          CRANK_KEYPAIR: ${{ inputs.crank_keypair }}
          PROGRAM_ID: 4npVSUH3hx62E5VJSWdoCyUwfBnZirMxzqfDNWNCcYbT
          RPC_URL: https://api.devnet.solana.com
          POLL_INTERVAL_MS: '10000'
        run: timeout 420 npx ts-node --transpile-only crank/crank.ts || echo "Exit: $?"
