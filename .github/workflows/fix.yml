name: Find What Broke

on:
 push:
 workflow_dispatch:

jobs:
 scan:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4

     - name: Scan for unguarded URLs from env vars
       run: |
         echo "=== Every transport / provider / client call ==="
         grep -rnE "createPublicClient|createWalletClient|http\(|JsonRpcProvider|configureChains|getDefaultConfig|WalletConnect|Alchemy|Infura" \
           --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" \
           src/ 2>/dev/null || echo "  (no matches)"

         echo ""
         echo "=== Every process.env.* reference ==="
         grep -rnE "process\.env\.[A-Z_]+" \
           --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" \
           src/ 2>/dev/null || echo "  (no matches)"

         echo ""
         echo "=== Env vars used in code vs .env.example ==="
         USED=$(grep -rhoE "process\.env\.[A-Z_]+" --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" src/ 2>/dev/null | sort -u | sed 's/process\.env\.//')
         EXAMPLE=$(grep -oE "^[A-Z_]+" .env.example 2>/dev/null | sort -u)
         for v in $USED; do
           if ! echo "$EXAMPLE" | grep -qx "$v"; then
             echo "  MISSING from .env.example: $v"
           fi
         done

         echo ""
         echo "=== Recent commits touching RPC / chain / env config ==="
         git log --oneline -20 -- src/ 2>/dev/null | head -20
       continue-on-error: true
