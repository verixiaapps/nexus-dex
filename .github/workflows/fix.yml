name: Debug blank screen

# Run manually from the Actions tab on GitHub.
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test'
        required: false
        default: 'https://swap.verixiaapps.com'

jobs:
  capture-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Open site, capture console + errors + network failures
        run: |
          cat > debug.js <<'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const url = process.argv[2] || 'https://swap.verixiaapps.com';
            const browser = await chromium.launch();
            const ctx = await browser.newContext({
              userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1',
              viewport: { width: 390, height: 844 },
            });
            const page = await ctx.newPage();

            const lines = [];
            page.on('console',  m => lines.push('[console.' + m.type() + '] ' + m.text()));
            page.on('pageerror', e => lines.push('[pageerror] ' + (e && e.stack || e)));
            page.on('requestfailed', r => lines.push('[requestfailed] ' + r.url() + ' :: ' + (r.failure() && r.failure().errorText)));
            page.on('response', async r => {
              if (r.status() >= 400) lines.push('[http ' + r.status() + '] ' + r.url());
            });

            console.log('Opening: ' + url);
            try {
              await page.goto(url, { waitUntil: 'networkidle', timeout: 45000 });
            } catch (e) {
              lines.push('[goto-error] ' + (e && e.message));
            }

            // give the bundle a moment to crash if it's going to
            await page.waitForTimeout(5000);

            const bodyText = (await page.evaluate(() => document.body && document.body.innerText) || '').slice(0, 500);
            const html     = (await page.content()).slice(0, 2000);

            console.log('\n========== CONSOLE / ERRORS ==========');
            if (lines.length === 0) console.log('(no console output captured)');
            else lines.forEach(l => console.log(l));

            console.log('\n========== VISIBLE BODY TEXT (first 500) ==========');
            console.log(bodyText || '(empty)');

            console.log('\n========== HTML (first 2000) ==========');
            console.log(html);

            await browser.close();
          })().catch(e => { console.error(e); process.exit(1); });
          EOF
          node debug.js "${{ inputs.url }}"
