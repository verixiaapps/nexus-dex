name: Build Diagnostic

on:
 push:
   branches: [main, master]
   paths:
     - 'public/**'
     - 'src/**'
     - 'package.json'
     - 'config-overrides*.js'
     - 'scripts/**'
 workflow_dispatch:
   inputs:
     slug:
       description: 'Specific slug to check (default: amazon-stock-token)'
       required: false
       default: 'amazon-stock-token'

jobs:
 diagnose:
   runs-on: ubuntu-latest
   timeout-minutes: 15

   steps:
     - name: Checkout
       uses: actions/checkout@v4

     - name: Setup Node 22
       uses: actions/setup-node@v4
       with:
         node-version: '22'
         cache: 'npm'

     - name: Count slug folders in public/ BEFORE build
       run: |
         PUBLIC_DIRS=$(find public -maxdepth 1 -mindepth 1 -type d | wc -l)
         echo "Slug folders in public/: $PUBLIC_DIRS"
         echo "PUBLIC_DIRS=$PUBLIC_DIRS" >> $GITHUB_ENV

     - name: npm install
       run: npm install --legacy-peer-deps

     - name: Run CRA build (matches Railway)
       run: npm run build:all
       env:
         CI: 'false'
         NODE_OPTIONS: '--max-old-space-size=4096'

     - name: Count slug folders in build/ AFTER build
       run: |
         if [ ! -d build ]; then
           echo "::error::build/ directory does not exist after build"
           exit 1
         fi
         BUILD_DIRS=$(find build -maxdepth 1 -mindepth 1 -type d | wc -l)
         echo "Slug folders in build/: $BUILD_DIRS"
         echo "BUILD_DIRS=$BUILD_DIRS" >> $GITHUB_ENV

         SLUG="${{ github.event.inputs.slug || 'amazon-stock-token' }}"
         if [ -f "build/$SLUG/index.html" ]; then
           SIZE=$(wc -c < "build/$SLUG/index.html")
           echo "TARGET_EXISTS=true" >> $GITHUB_ENV
           echo "TARGET_SIZE=$SIZE" >> $GITHUB_ENV
         else
           echo "TARGET_EXISTS=false" >> $GITHUB_ENV
         fi

     - name: Diff public/ vs build/
       run: |
         comm -23 \
           <(find public -maxdepth 1 -mindepth 1 -type d -printf "%f\n" | sort) \
           <(find build  -maxdepth 1 -mindepth 1 -type d -printf "%f\n" | sort) \
           > missing.txt
         MISSING=$(wc -l < missing.txt)
         echo "MISSING_COUNT=$MISSING" >> $GITHUB_ENV

     - name: Write summary
       run: |
         {
           echo "# Build Diagnostic"
           echo ""
           echo "| Metric | Value |"
           echo "|---|---|"
           echo "| public/ slugs | $PUBLIC_DIRS |"
           echo "| build/ slugs | $BUILD_DIRS |"
           echo "| Missing | $MISSING_COUNT |"
           echo "| Target exists | $TARGET_EXISTS |"
           echo ""
           if [ "$MISSING_COUNT" -gt 0 ]; then
             echo "## ⚠ First 20 missing slugs:"
             echo '```'
             head -20 missing.txt
             echo '```'
           else
             echo "## ✅ All slugs made it through"
           fi
         } >> $GITHUB_STEP_SUMMARY

     - name: Upload missing list
       if: always()
       uses: actions/upload-artifact@v4
       with:
         name: missing-slugs
         path: missing.txt
         retention-days: 7
