name: Fix RPC URL
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace Ankr with PublicNode
        run: |
          find ./template ./defi -name "*.html" -exec sed -i 's|https://rpc.ankr.com/solana|https://solana-rpc.publicnode.com|g' {} +

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: replace Ankr RPC with PublicNode"
          git push
